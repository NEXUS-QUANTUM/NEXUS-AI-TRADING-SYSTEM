# ============================================================================
# LOGGING CONFIGURATION
# ============================================================================

logging:
  version: 1
  disable_existing_loggers: false

  formatters:
    default:
      format: "[%(asctime)s] %(levelname)s [%(name)s:%(lineno)d] %(message)s"
      datefmt: "%Y-%m-%d %H:%M:%S"
    json:
      class: pythonjsonlogger.jsonlogger.JsonFormatter
      format: "%(asctime)s %(levelname)s %(name)s %(message)s"

  handlers:
    console:
      class: logging.StreamHandler
      level: DEBUG
      formatter: default
      stream: ext://sys.stdout

    file:
      class: logging.handlers.RotatingFileHandler
      level: INFO
      formatter: default
      filename: ./logs/nexus_test.log
      maxBytes: 10485760
      backupCount: 5

    error_file:
      class: logging.handlers.RotatingFileHandler
      level: ERROR
      formatter: default
      filename: ./logs/nexus_test_errors.log
      maxBytes: 10485760
      backupCount: 5

    json_file:
      class: logging.handlers.RotatingFileHandler
      level: DEBUG
      formatter: json
      filename: ./logs/nexus_test_json.log
      maxBytes: 10485760
      backupCount: 5

  loggers:
    nexus:
      level: DEBUG
      handlers:
        - console
        - file
        - json_file
      propagate: false

    nexus.api:
      level: DEBUG
      handlers:
        - console
        - file
      propagate: false

    nexus.trading:
      level: DEBUG
      handlers:
        - console
        - file
        - json_file
      propagate: false

    nexus.ai:
      level: DEBUG
      handlers:
        - console
        - file
      propagate: false

    nexus.blockchain:
      level: DEBUG
      handlers:
        - console
        - file
      propagate: false

    nexus.security:
      level: INFO
      handlers:
        - console
        - file
        - error_file
      propagate: false

    root:
      level: INFO
      handlers:
        - console

