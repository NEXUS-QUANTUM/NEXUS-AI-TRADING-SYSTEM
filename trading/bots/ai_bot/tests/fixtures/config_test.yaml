# ============================================================================
# AI / ML CONFIGURATION
# ============================================================================

ai:
  models:
    path: ./data/models
    cache_size: 100
    max_models: 50

  prediction:
    enabled: true
    confidence_threshold: 0.6
    min_samples: 100
    max_horizon: 24
    ensemble_size: 5

  training:
    batch_size: 32
    epochs: 100
    learning_rate: 0.001
    validation_split: 0.2
    early_stopping: true
    patience: 10
    use_gpu: true
    gpu_id: 0

  models_config:
    lstm:
      hidden_size: 128
      num_layers: 2
      dropout: 0.2
      bidirectional: true
      attention: true

    transformer:
      d_model: 128
      nhead: 8
      num_layers: 3
      dim_feedforward: 256
      dropout: 0.1

    xgboost:
      max_depth: 6
      learning_rate: 0.1
      n_estimators: 100
      subsample: 0.8
      colsample_bytree: 0.8
      gamma: 0.1
      reg_alpha: 0.1
      reg_lambda: 1

    ensemble:
      voting: soft
      weights:
        lstm: 0.3
        transformer: 0.3
        xgboost: 0.4

# ============================================================================
# RISK MANAGEMENT CONFIGURATION
# ============================================================================

risk_management:
  max_position_size: 0.1
  max_portfolio_risk: 0.05
  max_drawdown: 0.1
  max_leverage: 2
  stop_loss: 0.02
  take_profit: 0.04
  trailing_stop: 0.015
  risk_free_rate: 0.02

  limits:
    max_orders_per_minute: 10
    max_orders_per_hour: 100
    max_orders_per_day: 1000
    max_value_per_order: 100000
    max_value_per_day: 1000000
    max_positions: 10
    max_positions_per_symbol: 1

  circuit_breakers:
    enabled: true
    max_loss_per_day: 0.05
    max_loss_per_hour: 0.02
    max_loss_per_trade: 0.01
    cooldown_period: 300

# ============================================================================
# TRADING CONFIGURATION
# ============================================================================

trading:
  mode: paper
  default_order_type: limit
  default_time_in_force: GTC
  execution_timeout: 30
  max_slippage: 0.005

  strategies:
    default: hybrid
    available:
      - trend_following
      - momentum
      - mean_reversion
      - breakout
      - scalping
      - grid_trading
      - arbitrage
      - hybrid
      - reinforcement

  strategy_params:
    trend_following:
      sma_fast: 20
      sma_slow: 50
      rsi_period: 14
      adx_period: 14
      adx_threshold: 25

    momentum:
      roc_period: 14
      rsi_period: 14
      macd_fast: 12
      macd_slow: 26
      macd_signal: 9
      volume_threshold: 1.2

    mean_reversion:
      bb_period: 20
      bb_std: 2
      rsi_period: 14
      rsi_oversold: 30
      rsi_overbought: 70
      z_score_entry: 2

    breakout:
      lookback_periods: 200
      consolidation_periods: 20
      volume_threshold: 1.5
      breakout_threshold: 0.015

    grid_trading:
      grid_levels: 10
      grid_spacing: 0.02
      take_profit: 0.01
      stop_loss: 0.03

    arbitrage:
      min_profit_percent: 0.5
      max_position_size: 50000
      max_slippage: 0.01
      exchanges:
        - binance
        - coinbase
        - kraken

    hybrid:
      weighting_method: performance
      consensus_threshold: 0.6
      max_strategies: 3
      enable_regime_detection: true

