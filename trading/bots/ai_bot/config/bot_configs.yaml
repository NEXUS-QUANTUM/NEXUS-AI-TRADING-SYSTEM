# ============================================================================
# GLOBAL BOT CONFIGURATION
# ============================================================================

global:
  name: "NEXUS AI Trading Bot"
  version: "3.0.0"
  environment: "production"
  log_level: "INFO"
  timezone: "UTC"

# ============================================================================
# DEFAULT BOT CONFIGURATION
# ============================================================================

default:
  enabled: true
  mode: "paper"  # paper, live, backtest
  symbols:
    - "BTC-USD"
    - "ETH-USD"
    - "SOL-USD"
  timeframe: "1h"
  initial_capital: 10000.0
  
  # Trading parameters
  trading:
    max_positions: 5
    max_position_size: 1000.0
    min_position_size: 10.0
    max_leverage: 2.0
    default_order_type: "limit"
    default_time_in_force: "GTC"
    max_slippage: 0.005
    execution_timeout: 30

  # Strategy settings
  strategy:
    active: "hybrid"
    min_confidence: 0.6
    position_sizing: "percentage"  # fixed, percentage, risk_based, volatility
    rebalance_threshold: 0.1
    enable_auto_compounding: true

  # Risk management
  risk:
    max_drawdown: 0.10
    risk_per_trade: 0.02
    stop_loss: 0.02
    take_profit: 0.04
    trailing_stop: 0.015
    use_trailing_stop: true
    max_risk_percent: 10.0
    max_risk_amount: 1000.0
    
  # AI Models
  models:
    active:
      - "lstm"
      - "transformer"
      - "xgboost"
      - "ensemble"
    min_confidence: 0.6
    retraining_frequency: "weekly"  # daily, weekly, monthly, manual
    ensemble_weights:
      lstm: 0.30
      transformer: 0.30
      xgboost: 0.40

  # Data collection
  data:
    lookback_days: 365
    update_interval: 60
    cache_size: 1000
    max_history: 10000

  # Performance tracking
  performance:
    track_pnl: true
    track_trades: true
    track_positions: true
    history_days: 365
    metrics_interval: 60

  # Monitoring
  monitoring:
    enabled: true
    interval: 60
    alert_thresholds:
      cpu: 80.0
      memory: 85.0
      disk: 85.0
      latency: 500.0
      error_rate: 0.01

  # Notifications
  notifications:
    enabled: true
    channels:
      - "websocket"
      - "telegram"
    events:
      - "trade"
      - "order"
      - "alert"
      - "error"
      - "position"

# ============================================================================
# DEVELOPMENT CONFIGURATION
# ============================================================================

development:
  extends: default
  environment: "development"
  mode: "paper"
  log_level: "DEBUG"
  enabled: true
  symbols:
    - "BTC-USD"
    - "ETH-USD"
  initial_capital: 10000.0
  
  trading:
    max_positions: 3
    max_position_size: 500.0
    
  data:
    lookback_days: 30
    update_interval: 30
    cache_size: 500

  risk:
    max_drawdown: 0.05
    risk_per_trade: 0.01
    
  monitoring:
    interval: 30
    
  notifications:
    enabled: false

# ============================================================================
# PRODUCTION CONFIGURATION
# ============================================================================

production:
  extends: default
  environment: "production"
  mode: "live"
  log_level: "INFO"
  enabled: true
  symbols:
    - "BTC-USD"
    - "ETH-USD"
    - "SOL-USD"
    - "ADA-USD"
    - "DOT-USD"
    - "MATIC-USD"
    - "AVAX-USD"
    - "DOGE-USD"
    - "LINK-USD"
    - "UNI-USD"
  initial_capital: 50000.0
  
  trading:
    max_positions: 10
    max_position_size: 5000.0
    min_position_size: 50.0
    
  strategy:
    min_confidence: 0.7
    
  risk:
    max_drawdown: 0.08
    risk_per_trade: 0.015
    max_risk_percent: 8.0
    
  data:
    lookback_days: 730
    cache_size: 5000
    
  monitoring:
    alert_thresholds:
      cpu: 70.0
      memory: 80.0
      disk: 80.0
      latency: 300.0
      error_rate: 0.005

# ============================================================================
# PAPER TRADING CONFIGURATION
# ============================================================================

paper_trading:
  extends: default
  mode: "paper"
  log_level: "INFO"
  enabled: true
  initial_capital: 100000.0
  
  trading:
    max_positions: 20
    max_position_size: 10000.0
    
  risk:
    max_drawdown: 0.15
    risk_per_trade: 0.02
    
  data:
    lookback_days: 365
    
  notifications:
    enabled: true
    channels:
      - "websocket"
      - "telegram"
      - "email"

# ============================================================================
# BACKTEST CONFIGURATION
# ============================================================================

backtest:
  extends: default
  mode: "backtest"
  log_level: "INFO"
  enabled: true
  initial_capital: 10000.0
  
  backtest:
    start_date: "2024-01-01"
    end_date: "2025-01-01"
    commission: 0.001
    slippage: 0.001
    report_format: "detailed"
    
  trading:
    max_positions: 5
    max_position_size: 1000.0
    
  data:
    lookback_days: 365
    
  monitoring:
    enabled: false
    
  notifications:
    enabled: false

# ============================================================================
# HIGH FREQUENCY CONFIGURATION
# ============================================================================

high_frequency:
  extends: default
  mode: "live"
  log_level: "DEBUG"
  enabled: true
  symbols:
    - "BTC-USD"
    - "ETH-USD"
  timeframe: "1m"
  initial_capital: 10000.0
  
  trading:
    max_positions: 3
    max_position_size: 100.0
    max_slippage: 0.001
    execution_timeout: 5
    
  strategy:
    active: "scalping"
    min_confidence: 0.8
    
  risk:
    max_drawdown: 0.02
    risk_per_trade: 0.005
    stop_loss: 0.005
    take_profit: 0.01
    
  data:
    lookback_days: 30
    update_interval: 1
    cache_size: 200
    
  monitoring:
    interval: 10
    alert_thresholds:
      cpu: 60.0
      memory: 70.0
      latency: 100.0

# ============================================================================
# SWING TRADING CONFIGURATION
# ============================================================================

swing_trading:
  extends: default
  mode: "live"
  log_level: "INFO"
  enabled: true
  symbols:
    - "BTC-USD"
    - "ETH-USD"
    - "SOL-USD"
    - "ADA-USD"
    - "DOT-USD"
  timeframe: "4h"
  initial_capital: 20000.0
  
  trading:
    max_positions: 5
    max_position_size: 2000.0
    min_position_size: 100.0
    
  strategy:
    active: "trend_following"
    min_confidence: 0.6
    
  risk:
    max_drawdown: 0.1
    risk_per_trade: 0.015
    stop_loss: 0.03
    take_profit: 0.06
    trailing_stop: 0.02
    
  data:
    lookback_days: 180
    
  monitoring:
    interval: 300

# ============================================================================
# ARBITRAGE CONFIGURATION
# ============================================================================

arbitrage:
  extends: default
  mode: "live"
  log_level: "INFO"
  enabled: true
  symbols:
    - "BTC-USD"
    - "ETH-USD"
  timeframe: "1h"
  initial_capital: 50000.0
  
  strategy:
    active: "arbitrage"
    min_confidence: 0.8
    
  trading:
    max_positions: 10
    max_position_size: 5000.0
    
  risk:
    max_drawdown: 0.05
    risk_per_trade: 0.01
    stop_loss: 0.01
    
  data:
    lookback_days: 30
    
  monitoring:
    interval: 10

# ============================================================================
# REINFORCEMENT LEARNING CONFIGURATION
# ============================================================================

reinforcement_learning:
  extends: default
  mode: "paper"
  log_level: "DEBUG"
  enabled: true
  symbols:
    - "BTC-USD"
  timeframe: "1h"
  initial_capital: 10000.0
  
  strategy:
    active: "reinforcement"
    min_confidence: 0.7
    
  trading:
    max_positions: 3
    max_position_size: 1000.0
    
  risk:
    max_drawdown: 0.1
    risk_per_trade: 0.02
    
  data:
    lookback_days: 365
    
  models:
    active:
      - "dqn"
      - "ppo"
    retraining_frequency: "daily"

# ============================================================================
# RISK CONFIGURATIONS
# ============================================================================

risk_configs:
  conservative:
    max_drawdown: 0.05
    risk_per_trade: 0.01
    stop_loss: 0.01
    take_profit: 0.02
    max_positions: 3
    max_position_size: 500.0
    max_risk_percent: 5.0
    leverage: 1.0
    
  moderate:
    max_drawdown: 0.10
    risk_per_trade: 0.02
    stop_loss: 0.02
    take_profit: 0.04
    max_positions: 5
    max_position_size: 1000.0
    max_risk_percent: 10.0
    leverage: 2.0
    
  aggressive:
    max_drawdown: 0.15
    risk_per_trade: 0.03
    stop_loss: 0.03
    take_profit: 0.06
    max_positions: 10
    max_position_size: 2000.0
    max_risk_percent: 20.0
    leverage: 3.0

# ============================================================================
# STRATEGY CONFIGURATIONS
# ============================================================================

strategy_configs:
  trend_following:
    sma_fast: 20
    sma_slow: 50
    rsi_period: 14
    adx_period: 14
    adx_threshold: 25
    volume_threshold: 1.2
    min_trend_strength: 0.3
    
  momentum:
    roc_period: 14
    rsi_period: 14
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    volume_threshold: 1.2
    momentum_threshold: 0.5
    
  mean_reversion:
    bb_period: 20
    bb_std: 2.0
    rsi_period: 14
    rsi_oversold: 30
    rsi_overbought: 70
    z_score_entry: 2.0
    z_score_exit: 0.5
    
  breakout:
    lookback_periods: 200
    consolidation_periods: 20
    volume_threshold: 1.5
    breakout_threshold: 0.015
    retest_threshold: 0.005
    min_touches: 2
    
  scalping:
    order_book_depth: 10
    spread_threshold: 0.001
    volume_threshold: 1.5
    max_hold_time: 60
    min_profit: 0.001
    max_slippage: 0.001
    
  grid_trading:
    grid_levels: 10
    grid_spacing: 0.02
    take_profit: 0.01
    stop_loss: 0.03
    grid_range_percent: 0.1
    
  arbitrage:
    min_profit_percent: 0.5
    max_position_size: 50000.0
    max_slippage: 0.01
    exchanges:
      - "binance"
      - "coinbase"
      - "kraken"
      
  hybrid:
    weighting_method: "performance"
    consensus_threshold: 0.6
    max_strategies: 3
    enable_regime_detection: true
    strategy_weights:
      trend_following: 0.25
      momentum: 0.25
      mean_reversion: 0.20
      breakout: 0.30
      
  reinforcement:
    algorithm: "dqn"
    learning_rate: 0.001
    discount_factor: 0.99
    exploration_rate: 0.1
    hidden_layers: [256, 128, 64]
    batch_size: 64
    replay_buffer_size: 10000
    training_frequency: 10

# ============================================================================
# MODEL CONFIGURATIONS
# ============================================================================

model_configs:
  lstm:
    hidden_size: 128
    num_layers: 2
    dropout: 0.2
    bidirectional: true
    attention: true
    learning_rate: 0.001
    batch_size: 32
    epochs: 100
    early_stopping_patience: 10
    
  transformer:
    d_model: 128
    nhead: 8
    num_layers: 3
    dim_feedforward: 256
    dropout: 0.1
    learning_rate: 0.001
    batch_size: 32
    epochs: 100
    early_stopping_patience: 10
    
  xgboost:
    max_depth: 6
    learning_rate: 0.1
    n_estimators: 100
    subsample: 0.8
    colsample_bytree: 0.8
    gamma: 0.1
    reg_alpha: 0.1
    reg_lambda: 1.0
    random_state: 42
    
  ensemble:
    voting: "soft"
    weights:
      lstm: 0.30
      transformer: 0.30
      xgboost: 0.40
      
  dqn:
    state_dim: 50
    action_dim: 5
    hidden_layers: [256, 128]
    learning_rate: 0.001
    discount_factor: 0.99
    exploration_rate: 0.1
    batch_size: 64
    replay_buffer_size: 10000
    
  ppo:
    state_dim: 50
    action_dim: 5
    hidden_layers: [256, 128]
    learning_rate: 0.0003
    ppo_epochs: 10
    clip_epsilon: 0.2
    gae_lambda: 0.95
    batch_size: 64

# ============================================================================
# EXCHANGE CONFIGURATIONS
# ============================================================================

exchange_configs:
  binance:
    enabled: true
    testnet: false
    api_key: "${BINANCE_API_KEY}"
    api_secret: "${BINANCE_API_SECRET}"
    rate_limit: 1200
    symbols:
      - "BTCUSDT"
      - "ETHUSDT"
      - "SOLUSDT"
      - "ADAUSDT"
      - "DOTUSDT"
      
  coinbase:
    enabled: true
    sandbox: false
    api_key: "${COINBASE_API_KEY}"
    api_secret: "${COINBASE_API_SECRET}"
    passphrase: "${COINBASE_PASSPHRASE}"
    rate_limit: 100
    symbols:
      - "BTC-USD"
      - "ETH-USD"
      - "SOL-USD"
      
  kraken:
    enabled: true
    sandbox: false
    api_key: "${KRAKEN_API_KEY}"
    api_secret: "${KRAKEN_API_SECRET}"
    rate_limit: 100
    symbols:
      - "XBT/USD"
      - "ETH/USD"
      
  bybit:
    enabled: true
    testnet: false
    api_key: "${BYBIT_API_KEY}"
    api_secret: "${BYBIT_API_SECRET}"
    rate_limit: 50
    symbols:
      - "BTCUSDT"
      - "ETHUSDT"
      
  alpaca:
    enabled: false
    paper: true
    api_key: "${ALPACA_API_KEY}"
    api_secret: "${ALPACA_API_SECRET}"
    rate_limit: 200
    symbols:
      - "AAPL"
      - "MSFT"
      - "GOOGL"
      - "AMZN"
      - "TSLA"
      - "NVDA"

# ============================================================================
# DATA PROVIDER CONFIGURATIONS
# ============================================================================

data_providers:
  yahoo_finance:
    enabled: true
    timeout: 10
    retries: 3
    
  alpha_vantage:
    enabled: false
    api_key: "${ALPHA_VANTAGE_API_KEY}"
    timeout: 10
    
  polygon:
    enabled: false
    api_key: "${POLYGON_API_KEY}"
    timeout: 10
    
  coin_gecko:
    enabled: true
    timeout: 10
    retries: 3
    
  binance:
    enabled: true
    ws_enabled: true
    timeout: 10

# ============================================================================
# NOTIFICATION CONFIGURATIONS
# ============================================================================

notifications:
  telegram:
    enabled: false
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    chat_id: "${TELEGRAM_CHAT_ID}"
    
  discord:
    enabled: false
    webhook_url: "${DISCORD_WEBHOOK_URL}"
    
  slack:
    enabled: false
    webhook_url: "${SLACK_WEBHOOK_URL}"
    
  email:
    enabled: false
    smtp_host: "smtp.gmail.com"
    smtp_port: 587
    username: "${EMAIL_USERNAME}"
    password: "${EMAIL_PASSWORD}"
    from: "bot@nexustradingia.com"
    to: "alerts@nexustradingia.com"
    
  webhook:
    enabled: true
    endpoint: "/api/v1/webhooks"
    timeout: 10
    retries: 3

# ============================================================================
# LOGGING CONFIGURATION
# ============================================================================

logging:
  version: 1
  disable_existing_loggers: false
  
  formatters:
    default:
      format: "[%(asctime)s] %(levelname)s [%(name)s:%(lineno)d] %(message)s"
      datefmt: "%Y-%m-%d %H:%M:%S"
    json:
      class: pythonjsonlogger.jsonlogger.JsonFormatter
      format: "%(asctime)s %(levelname)s %(name)s %(message)s"
      
  handlers:
    console:
      class: logging.StreamHandler
      level: INFO
      formatter: default
      stream: "ext://sys.stdout"
    file:
      class: logging.handlers.RotatingFileHandler
      level: INFO
      formatter: default
      filename: "./logs/ai_bot.log"
      maxBytes: 10485760
      backupCount: 5
    error_file:
      class: logging.handlers.RotatingFileHandler
      level: ERROR
      formatter: default
      filename: "./logs/errors.log"
      maxBytes: 10485760
      backupCount: 5
    json_file:
      class: logging.handlers.RotatingFileHandler
      level: DEBUG
      formatter: json
      filename: "./logs/ai_bot_json.log"
      maxBytes: 10485760
      backupCount: 5
      
  loggers:
    nexus:
      level: INFO
      handlers: [console, file, json_file]
      propagate: false
    nexus.trading:
      level: INFO
      handlers: [console, file]
      propagate: false
    nexus.ai:
      level: INFO
      handlers: [console, file]
      propagate: false
    nexus.risk:
      level: INFO
      handlers: [console, file, error_file]
      propagate: false
    nexus.api:
      level: INFO
      handlers: [console, file]
      propagate: false
    nexus.blockchain:
      level: INFO
      handlers: [console, file]
      propagate: false
    root:
      level: INFO
      handlers: [console]
