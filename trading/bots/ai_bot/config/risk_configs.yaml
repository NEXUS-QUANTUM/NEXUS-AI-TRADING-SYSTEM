# ============================================================================
# RISK MANAGEMENT CONFIGURATIONS
# This file contains comprehensive risk management configurations for all
# trading scenarios and market conditions.
# ============================================================================

# ============================================================================
# GLOBAL RISK SETTINGS
# ============================================================================

global:
  enabled: true
  max_portfolio_risk: 0.05
  max_daily_loss: 0.02
  max_weekly_loss: 0.05
  max_monthly_loss: 0.10
  risk_free_rate: 0.02
  confidence_level: 0.95
  var_calculation_method: "historical"  # historical, parametric, monte_carlo
  stress_testing: true
  scenario_analysis: true

# ============================================================================
# CONSERVATIVE RISK PROFILE
# ============================================================================

conservative:
  name: "Conservative"
  description: "Maximum capital preservation with minimal risk"
  
  # Position sizing
  position_sizing:
    method: "fixed"
    fixed_size: 100.0
    percentage_of_capital: 0.01
    max_position_size: 500.0
    min_position_size: 10.0
    
  # Risk limits
  risk_limits:
    max_drawdown: 0.05
    max_loss_per_trade: 0.005
    max_loss_per_day: 0.01
    max_loss_per_week: 0.02
    max_loss_per_month: 0.05
    max_risk_per_trade: 0.01
    max_portfolio_risk: 0.02
    max_correlation: 0.7
    
  # Stop loss
  stop_loss:
    default: 0.01
    min: 0.005
    max: 0.02
    trailing: 0.01
    activation: 0.005
    
  # Take profit
  take_profit:
    default: 0.02
    min: 0.01
    max: 0.05
    
  # Position limits
  position_limits:
    max_positions: 3
    max_positions_per_symbol: 1
    max_volume_per_symbol: 1000
    max_concentration: 0.1
    max_leverage: 1.0
    
  # Circuit breakers
  circuit_breakers:
    enabled: true
    loss_threshold: 0.02
    time_window: 3600
    cooldown_period: 300
    
  # Risk metrics
  risk_metrics:
    var_95: 0.01
    var_99: 0.02
    expected_shortfall: 0.015
    sharpe_ratio_min: 0.5
    sortino_ratio_min: 0.7
    calmar_ratio_min: 0.3
    
  # VaR parameters
  var:
    confidence_level: 0.95
    lookback_period: 252
    method: "historical"

# ============================================================================
# MODERATE RISK PROFILE
# ============================================================================

moderate:
  name: "Moderate"
  description: "Balanced approach between risk and return"
  
  # Position sizing
  position_sizing:
    method: "percentage"
    fixed_size: 500.0
    percentage_of_capital: 0.02
    max_position_size: 2000.0
    min_position_size: 50.0
    
  # Risk limits
  risk_limits:
    max_drawdown: 0.10
    max_loss_per_trade: 0.01
    max_loss_per_day: 0.02
    max_loss_per_week: 0.04
    max_loss_per_month: 0.08
    max_risk_per_trade: 0.02
    max_portfolio_risk: 0.05
    max_correlation: 0.6
    
  # Stop loss
  stop_loss:
    default: 0.02
    min: 0.01
    max: 0.03
    trailing: 0.015
    activation: 0.01
    
  # Take profit
  take_profit:
    default: 0.04
    min: 0.02
    max: 0.06
    
  # Position limits
  position_limits:
    max_positions: 5
    max_positions_per_symbol: 2
    max_volume_per_symbol: 5000
    max_concentration: 0.2
    max_leverage: 2.0
    
  # Circuit breakers
  circuit_breakers:
    enabled: true
    loss_threshold: 0.03
    time_window: 1800
    cooldown_period: 600
    
  # Risk metrics
  risk_metrics:
    var_95: 0.02
    var_99: 0.04
    expected_shortfall: 0.03
    sharpe_ratio_min: 0.8
    sortino_ratio_min: 1.0
    calmar_ratio_min: 0.5
    
  # VaR parameters
  var:
    confidence_level: 0.95
    lookback_period: 252
    method: "parametric"

# ============================================================================
# AGGRESSIVE RISK PROFILE
# ============================================================================

aggressive:
  name: "Aggressive"
  description: "Maximizing returns with higher risk tolerance"
  
  # Position sizing
  position_sizing:
    method: "risk_based"
    fixed_size: 1000.0
    percentage_of_capital: 0.03
    max_position_size: 5000.0
    min_position_size: 100.0
    
  # Risk limits
  risk_limits:
    max_drawdown: 0.15
    max_loss_per_trade: 0.02
    max_loss_per_day: 0.03
    max_loss_per_week: 0.06
    max_loss_per_month: 0.12
    max_risk_per_trade: 0.03
    max_portfolio_risk: 0.08
    max_correlation: 0.5
    
  # Stop loss
  stop_loss:
    default: 0.03
    min: 0.015
    max: 0.05
    trailing: 0.025
    activation: 0.02
    
  # Take profit
  take_profit:
    default: 0.06
    min: 0.03
    max: 0.10
    
  # Position limits
  position_limits:
    max_positions: 10
    max_positions_per_symbol: 3
    max_volume_per_symbol: 10000
    max_concentration: 0.3
    max_leverage: 3.0
    
  # Circuit breakers
  circuit_breakers:
    enabled: true
    loss_threshold: 0.05
    time_window: 900
    cooldown_period: 1200
    
  # Risk metrics
  risk_metrics:
    var_95: 0.03
    var_99: 0.06
    expected_shortfall: 0.045
    sharpe_ratio_min: 1.0
    sortino_ratio_min: 1.5
    calmar_ratio_min: 0.7
    
  # VaR parameters
  var:
    confidence_level: 0.95
    lookback_period: 252
    method: "monte_carlo"

# ============================================================================
# EXTREME RISK PROFILE
# ============================================================================

extreme:
  name: "Extreme"
  description: "Maximum risk for maximum potential returns"
  
  # Position sizing
  position_sizing:
    method: "kelly"
    fixed_size: 2000.0
    percentage_of_capital: 0.05
    max_position_size: 10000.0
    min_position_size: 200.0
    
  # Risk limits
  risk_limits:
    max_drawdown: 0.25
    max_loss_per_trade: 0.03
    max_loss_per_day: 0.05
    max_loss_per_week: 0.10
    max_loss_per_month: 0.20
    max_risk_per_trade: 0.05
    max_portfolio_risk: 0.12
    max_correlation: 0.4
    
  # Stop loss
  stop_loss:
    default: 0.05
    min: 0.02
    max: 0.08
    trailing: 0.04
    activation: 0.03
    
  # Take profit
  take_profit:
    default: 0.10
    min: 0.05
    max: 0.20
    
  # Position limits
  position_limits:
    max_positions: 15
    max_positions_per_symbol: 5
    max_volume_per_symbol: 20000
    max_concentration: 0.4
    max_leverage: 5.0
    
  # Circuit breakers
  circuit_breakers:
    enabled: true
    loss_threshold: 0.08
    time_window: 600
    cooldown_period: 1800
    
  # Risk metrics
  risk_metrics:
    var_95: 0.05
    var_99: 0.10
    expected_shortfall: 0.075
    sharpe_ratio_min: 1.2
    sortino_ratio_min: 2.0
    calmar_ratio_min: 1.0
    
  # VaR parameters
  var:
    confidence_level: 0.95
    lookback_period: 252
    method: "monte_carlo"

# ============================================================================
# POSITION SIZING CONFIGURATIONS
# ============================================================================

position_sizing:
  # Fixed position sizing
  fixed:
    method: "fixed"
    size: 100.0
    min_size: 10.0
    max_size: 1000.0
    
  # Percentage of capital
  percentage:
    method: "percentage"
    percentage: 0.02
    min_size: 50.0
    max_size: 5000.0
    
  # Risk-based (Kelly Criterion)
  risk_based:
    method: "risk_based"
    kelly_fraction: 0.25
    min_size: 50.0
    max_size: 5000.0
    risk_per_trade: 0.02
    stop_loss: 0.02
    
  # Volatility-based
  volatility:
    method: "volatility"
    target_volatility: 0.10
    min_size: 50.0
    max_size: 5000.0
    lookback_period: 20
    scaling_factor: 1.0

# ============================================================================
# STOP LOSS CONFIGURATIONS
# ============================================================================

stop_loss:
  # Fixed stop loss
  fixed:
    type: "fixed"
    percentage: 0.02
    min: 0.01
    max: 0.05
    
  # Trailing stop loss
  trailing:
    type: "trailing"
    percentage: 0.015
    activation: 0.01
    min: 0.005
    max: 0.03
    
  # ATR-based stop loss
  atr:
    type: "atr"
    multiplier: 2.0
    period: 14
    min: 0.01
    max: 0.05
    
  # Volatility-based stop loss
  volatility_stop:
    type: "volatility"
    multiplier: 1.5
    lookback: 20
    min: 0.01
    max: 0.05

# ============================================================================
# TAKE PROFIT CONFIGURATIONS
# ============================================================================

take_profit:
  # Fixed take profit
  fixed:
    type: "fixed"
    percentage: 0.04
    min: 0.02
    max: 0.10
    
  # Risk-reward ratio
  risk_reward:
    type: "risk_reward"
    ratio: 2.0
    min: 1.0
    max: 5.0
    
  # ATR-based take profit
  atr:
    type: "atr"
    multiplier: 3.0
    period: 14
    min: 0.02
    max: 0.10
    
  # Trailing take profit
  trailing:
    type: "trailing"
    percentage: 0.01
    activation: 0.02

# ============================================================================
# CIRCUIT BREAKER CONFIGURATIONS
# ============================================================================

circuit_breakers:
  # Daily circuit breaker
  daily:
    enabled: true
    loss_threshold: 0.05
    time_window: 86400
    cooldown_period: 3600
    
  # Hourly circuit breaker
  hourly:
    enabled: true
    loss_threshold: 0.02
    time_window: 3600
    cooldown_period: 1800
    
  # Trade circuit breaker
  trade:
    enabled: true
    loss_threshold: 0.01
    time_window: 300
    cooldown_period: 600
    
  # Volatility circuit breaker
  volatility:
    enabled: true
    threshold: 0.03
    lookback: 10
    cooldown_period: 900

# ============================================================================
# VALUE AT RISK (VaR) CONFIGURATIONS
# ============================================================================

var:
  # Historical VaR
  historical:
    method: "historical"
    confidence_level: 0.95
    lookback_period: 252
    window: 20
    
  # Parametric VaR
  parametric:
    method: "parametric"
    confidence_level: 0.95
    lookback_period: 252
    distribution: "normal"  # normal, t
    
  # Monte Carlo VaR
  monte_carlo:
    method: "monte_carlo"
    confidence_level: 0.95
    lookback_period: 252
    simulations: 10000
    horizon: 1
    
  # Expected Shortfall (CVaR)
  expected_shortfall:
    method: "expected_shortfall"
    confidence_level: 0.95
    lookback_period: 252
    simulations: 10000

# ============================================================================
# STRESS TESTING CONFIGURATIONS
# ============================================================================

stress_testing:
  scenarios:
    # Market crash scenario
    market_crash:
      name: "Market Crash"
      description: "50% market drop over 30 days"
      variables:
        market_return: -0.50
        volatility: 0.80
        correlation: 0.9
        liquidity: 0.1
        
    # Flash crash scenario
    flash_crash:
      name: "Flash Crash"
      description: "20% drop in 1 hour"
      variables:
        market_return: -0.20
        volatility: 0.50
        correlation: 0.8
        liquidity: 0.05
        
    # Inflation shock
    inflation_shock:
      name: "Inflation Shock"
      description: "5% inflation spike"
      variables:
        interest_rate: 0.05
        inflation: 0.05
        market_return: -0.15
        volatility: 0.40
        
    # Black swan
    black_swan:
      name: "Black Swan"
      description: "Extreme market event"
      variables:
        market_return: -0.40
        volatility: 0.70
        correlation: 0.95
        liquidity: 0.01
        
    # Exchange failure
    exchange_failure:
      name: "Exchange Failure"
      description: "Exchange goes offline"
      variables:
        market_return: -0.10
        volatility: 0.30
        liquidity: 0.0
        counterparty: 0.5

# ============================================================================
# CORRELATION CONFIGURATIONS
# ============================================================================

correlation:
  # Asset correlations
  crypto:
    BTC-USD: 1.0
    ETH-USD: 0.8
    SOL-USD: 0.6
    ADA-USD: 0.5
    DOT-USD: 0.5
    MATIC-USD: 0.4
    AVAX-USD: 0.4
    DOGE-USD: 0.3
    LINK-USD: 0.4
    UNI-USD: 0.4
    
  # Sector correlations
  sectors:
    crypto: 0.7
    forex: 0.3
    stocks: 0.5
    
  # Correlation matrix
  matrix:
    enabled: true
    update_frequency: 3600
    lookback_period: 30

# ============================================================================
# HEDGING CONFIGURATIONS
# ============================================================================

hedging:
  enabled: true
  strategies:
    - "delta"
    - "beta"
    - "portfolio"
    
  # Delta hedging
  delta:
    enabled: true
    threshold: 0.1
    rebalance_frequency: 3600
    
  # Beta hedging
  beta:
    enabled: true
    target_beta: 0.5
    rebalance_frequency: 3600
    
  # Portfolio hedging
  portfolio:
    enabled: true
    hedge_ratio: 0.5
    instruments:
      - "BTC-USD"
      - "ETH-USD"

# ============================================================================
# RISK REPORTING CONFIGURATIONS
# ============================================================================

reporting:
  enabled: true
  format: "json"  # json, csv, html
  frequency: "daily"  # hourly, daily, weekly, monthly
  
  reports:
    - "pnl"
    - "drawdown"
    - "var"
    - "stress_test"
    - "correlation"
    - "concentration"
    - "liquidity"
    
  alerts:
    enabled: true
    channels: ["email", "telegram"]
    thresholds:
      drawdown: 0.10
      var_exceedance: 0.02
      correlation_change: 0.2
      liquidity_drop: 0.3

# ============================================================================
# LIQUIDITY RISK CONFIGURATIONS
# ============================================================================

liquidity:
  # Minimum liquidity requirements
  min_volume: 100000
  min_depth: 10000
  max_spread: 0.01
  min_trades: 100
  
  # Slippage estimates
  slippage:
    base: 0.001
    volume_multiplier: 0.0001
    max: 0.01
    
  # Position limits based on liquidity
  position_limits:
    method: "percentage_of_volume"
    percentage: 0.01
    max: 0.05
    
  # Liquidation risk
  liquidation:
    enabled: true
    threshold: 0.8
    time_to_liquidate: 3600

# ============================================================================
# CONCENTRATION RISK CONFIGURATIONS
# ============================================================================

concentration:
  max_asset_concentration: 0.3
  max_sector_concentration: 0.5
  max_counterparty_concentration: 0.25
  
  # Herfindahl-Hirschman Index (HHI)
  hhi:
    enabled: true
    threshold: 0.25
    
  # Gini coefficient
  gini:
    enabled: true
    threshold: 0.6

# ============================================================================
# COUNTERPARTY RISK CONFIGURATIONS
# ============================================================================

counterparty:
  max_exposure_per_exchange: 0.5
  max_exposure_per_counterparty: 0.3
  concentration_warning: 0.4
  concentration_critical: 0.6
  
  # Exchange ratings
  exchange_ratings:
    binance: "AAA"
    coinbase: "AA"
    kraken: "AA"
    bybit: "A"
    oanda: "A"
