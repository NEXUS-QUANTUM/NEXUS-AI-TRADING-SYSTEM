<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="theme-color" content="#0A0A0F">
    <meta name="description" content="NEXUS Arbitrage Bot - Real-time trading alerts system">
    <title>NEXUS Arbitrage Alerts</title>
    
    <!-- ============================================
    FONTS & ICONS
    ============================================ -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    
    <style>
        /* ============================================
           SECTION 1: ROOT VARIABLES - NEXUS THEME
           ============================================ */
        :root {
            /* --- Brand Colors --- */
            --nexus-primary: #6C3CE1;
            --nexus-primary-dark: #4A1FA8;
            --nexus-primary-light: #8B6BEE;
            --nexus-primary-gradient: linear-gradient(135deg, #6C3CE1 0%, #8B6BEE 50%, #00D4AA 100%);
            --nexus-secondary: #00D4AA;
            --nexus-secondary-dark: #00A88A;
            --nexus-secondary-light: #33E0C0;
            --nexus-accent: #FF6B6B;
            --nexus-accent-dark: #E05555;
            --nexus-warning: #FFB84D;
            --nexus-warning-dark: #E6A040;
            
            /* --- Alert Types --- */
            --alert-info: #6C3CE1;
            --alert-info-bg: rgba(108, 60, 225, 0.08);
            --alert-info-border: rgba(108, 60, 225, 0.15);
            --alert-info-glow: rgba(108, 60, 225, 0.15);
            
            --alert-success: #00D4AA;
            --alert-success-bg: rgba(0, 212, 170, 0.08);
            --alert-success-border: rgba(0, 212, 170, 0.15);
            --alert-success-glow: rgba(0, 212, 170, 0.15);
            
            --alert-warning: #FFB84D;
            --alert-warning-bg: rgba(255, 184, 77, 0.08);
            --alert-warning-border: rgba(255, 184, 77, 0.15);
            --alert-warning-glow: rgba(255, 184, 77, 0.15);
            
            --alert-danger: #FF6B6B;
            --alert-danger-bg: rgba(255, 107, 107, 0.08);
            --alert-danger-border: rgba(255, 107, 107, 0.15);
            --alert-danger-glow: rgba(255, 107, 107, 0.15);
            
            --alert-critical: #FF0044;
            --alert-critical-bg: rgba(255, 0, 68, 0.1);
            --alert-critical-border: rgba(255, 0, 68, 0.25);
            --alert-critical-glow: rgba(255, 0, 68, 0.3);
            
            /* --- Gradients --- */
            --gradient-primary: linear-gradient(135deg, #6C3CE1 0%, #00D4AA 100%);
            --gradient-accent: linear-gradient(135deg, #FF6B6B 0%, #FFB84D 100%);
            --gradient-critical: linear-gradient(135deg, #FF0044 0%, #FF6B6B 100%);
            --gradient-success: linear-gradient(135deg, #00D4AA 0%, #33E0C0 100%);
            
            /* --- Backgrounds --- */
            --bg-primary: #0A0A0F;
            --bg-secondary: #0F0F18;
            --bg-tertiary: #13131A;
            --bg-card: #1A1A24;
            --bg-card-hover: #222233;
            --bg-card-active: #2A2A3E;
            --bg-elevated: rgba(26, 26, 36, 0.95);
            --bg-overlay: rgba(10, 10, 15, 0.85);
            
            /* --- Text --- */
            --text-primary: #FFFFFF;
            --text-secondary: #A0A0B8;
            --text-muted: #6B6B85;
            --text-disabled: #3D3D55;
            
            /* --- Borders --- */
            --border-color: rgba(108, 60, 225, 0.12);
            --border-color-hover: rgba(108, 60, 225, 0.3);
            --border-color-light: rgba(255, 255, 255, 0.05);
            --border-color-dark: rgba(0, 0, 0, 0.3);
            
            /* --- Shadows --- */
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.4);
            --shadow-card-hover: 0 12px 48px rgba(0, 0, 0, 0.6);
            --shadow-glow: 0 0 60px rgba(108, 60, 225, 0.06);
            --shadow-glow-strong: 0 0 80px rgba(108, 60, 225, 0.12);
            --shadow-dropdown: 0 20px 60px rgba(0, 0, 0, 0.6);
            
            /* --- Animations --- */
            --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-base: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-bounce: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            
            /* --- Border Radius --- */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --radius-full: 9999px;
        }
        
        /* ============================================
           SECTION 2: RESET & BASE STYLES
           ============================================ */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 20px;
        }
        
        /* ============================================
           SECTION 3: SCROLLBAR STYLING
           ============================================ */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--nexus-primary);
            border-radius: var(--radius-full);
            transition: var(--transition-base);
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--nexus-primary-light);
        }
        
        ::-webkit-scrollbar-corner {
            background: var(--bg-primary);
        }
        
        /* ============================================
           SECTION 4: SELECTION
           ============================================ */
        ::selection {
            background: var(--nexus-primary);
            color: var(--text-primary);
        }
        
        /* ============================================
           SECTION 5: ALERTS CONTAINER
           ============================================ */
        .alerts-container {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 460px;
            width: 100%;
            pointer-events: none;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
            padding: 4px;
        }
        
        .alerts-container::-webkit-scrollbar {
            width: 4px;
        }
        
        .alerts-container::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .alerts-container::-webkit-scrollbar-thumb {
            background: var(--nexus-primary);
            border-radius: var(--radius-full);
        }
        
        /* ============================================
           SECTION 6: SINGLE ALERT
           ============================================ */
        .alert-item {
            pointer-events: auto;
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 16px 20px;
            backdrop-filter: blur(24px) saturate(1.4);
            -webkit-backdrop-filter: blur(24px) saturate(1.4);
            box-shadow: var(--shadow-card);
            transition: all var(--transition-bounce);
            position: relative;
            overflow: hidden;
            animation: alertSlideIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            transform-origin: top right;
            will-change: transform, opacity;
        }
        
        .alert-item:hover {
            transform: translateX(-6px) scale(1.01);
            box-shadow: var(--shadow-card-hover), var(--shadow-glow);
            border-color: var(--border-color-hover);
        }
        
        .alert-item.removing {
            animation: alertSlideOut 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        
        @keyframes alertSlideIn {
            0% {
                opacity: 0;
                transform: translateX(120px) scale(0.85) rotateY(10deg);
            }
            60% {
                opacity: 1;
                transform: translateX(-10px) scale(1.02);
            }
            100% {
                opacity: 1;
                transform: translateX(0) scale(1) rotateY(0deg);
            }
        }
        
        @keyframes alertSlideOut {
            0% {
                opacity: 1;
                transform: translateX(0) scale(1) rotateY(0deg);
            }
            100% {
                opacity: 0;
                transform: translateX(120px) scale(0.85) rotateY(-10deg);
            }
        }
        
        /* --- Alert Glow Effect --- */
        .alert-item::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), 
                rgba(108, 60, 225, 0.04) 0%, 
                transparent 60%);
            pointer-events: none;
            opacity: 0;
            transition: opacity var(--transition-base);
        }
        
        .alert-item:hover::before {
            opacity: 1;
        }
        
        /* --- Alert Type Glow --- */
        .alert-item.type-info::after {
            box-shadow: 0 0 40px var(--alert-info-glow);
        }
        .alert-item.type-success::after {
            box-shadow: 0 0 40px var(--alert-success-glow);
        }
        .alert-item.type-warning::after {
            box-shadow: 0 0 40px var(--alert-warning-glow);
        }
        .alert-item.type-danger::after {
            box-shadow: 0 0 40px var(--alert-danger-glow);
        }
        .alert-item.type-critical::after {
            box-shadow: 0 0 60px var(--alert-critical-glow);
            animation: criticalGlow 1.5s ease-in-out infinite;
        }
        
        @keyframes criticalGlow {
            0%, 100% { box-shadow: 0 0 40px var(--alert-critical-glow); }
            50% { box-shadow: 0 0 80px var(--alert-critical-glow); }
        }
        
        /* --- Alert Progress Bar --- */
        .alert-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 0 0 var(--radius-md) var(--radius-md);
            overflow: hidden;
        }
        
        .alert-progress-bar {
            height: 100%;
            border-radius: 0 0 var(--radius-md) var(--radius-md);
            background: var(--gradient-primary);
            transition: width 0.3s linear;
            width: 100%;
            will-change: width;
        }
        
        .alert-progress-bar.paused {
            animation-play-state: paused;
        }
        
        /* ============================================
           SECTION 7: ALERT TYPES
           ============================================ */
        .alert-item.type-info {
            border-left: 4px solid var(--alert-info);
            background: var(--alert-info-bg);
        }
        .alert-item.type-info .alert-progress-bar {
            background: var(--alert-info);
        }
        .alert-item.type-info .alert-icon {
            color: var(--alert-info);
        }
        .alert-item.type-info .alert-icon-wrapper {
            background: var(--alert-info-bg);
            border: 1px solid var(--alert-info-border);
        }
        
        .alert-item.type-success {
            border-left: 4px solid var(--alert-success);
            background: var(--alert-success-bg);
        }
        .alert-item.type-success .alert-progress-bar {
            background: var(--gradient-success);
        }
        .alert-item.type-success .alert-icon {
            color: var(--alert-success);
        }
        .alert-item.type-success .alert-icon-wrapper {
            background: var(--alert-success-bg);
            border: 1px solid var(--alert-success-border);
        }
        
        .alert-item.type-warning {
            border-left: 4px solid var(--alert-warning);
            background: var(--alert-warning-bg);
        }
        .alert-item.type-warning .alert-progress-bar {
            background: var(--alert-warning);
        }
        .alert-item.type-warning .alert-icon {
            color: var(--alert-warning);
        }
        .alert-item.type-warning .alert-icon-wrapper {
            background: var(--alert-warning-bg);
            border: 1px solid var(--alert-warning-border);
        }
        
        .alert-item.type-danger {
            border-left: 4px solid var(--alert-danger);
            background: var(--alert-danger-bg);
        }
        .alert-item.type-danger .alert-progress-bar {
            background: var(--alert-danger);
        }
        .alert-item.type-danger .alert-icon {
            color: var(--alert-danger);
        }
        .alert-item.type-danger .alert-icon-wrapper {
            background: var(--alert-danger-bg);
            border: 1px solid var(--alert-danger-border);
        }
        
        .alert-item.type-critical {
            border-left: 4px solid var(--alert-critical);
            border-color: var(--alert-critical-border);
            background: var(--alert-critical-bg);
            animation: criticalPulse 2s ease-in-out infinite;
        }
        .alert-item.type-critical .alert-progress-bar {
            background: var(--gradient-critical);
        }
        .alert-item.type-critical .alert-icon {
            color: var(--alert-critical);
        }
        .alert-item.type-critical .alert-icon-wrapper {
            background: var(--alert-critical-bg);
            border: 1px solid var(--alert-critical-border);
            animation: criticalIconPulse 1.5s ease-in-out infinite;
        }
        .alert-item.type-critical .alert-title {
            color: var(--alert-critical);
        }
        
        @keyframes criticalPulse {
            0%, 100% { border-color: var(--alert-critical-border); }
            50% { border-color: var(--alert-critical); }
        }
        
        @keyframes criticalIconPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        
        /* ============================================
           SECTION 8: ALERT CONTENT
           ============================================ */
        .alert-content {
            display: flex;
            gap: 14px;
            align-items: flex-start;
        }
        
        .alert-icon-wrapper {
            flex-shrink: 0;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-full);
            font-size: 1.1rem;
            transition: all var(--transition-base);
        }
        
        .alert-item:hover .alert-icon-wrapper {
            transform: scale(1.05);
        }
        
        .alert-text {
            flex: 1;
            min-width: 0;
        }
        
        .alert-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 3px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .alert-title .alert-badge {
            font-size: 0.45rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            padding: 0.08rem 0.6rem;
            border-radius: var(--radius-full);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-muted);
            border: 1px solid var(--border-color-light);
            transition: all var(--transition-base);
        }
        
        .alert-item:hover .alert-badge {
            background: rgba(255, 255, 255, 0.08);
        }
        
        .alert-item.type-critical .alert-badge {
            background: var(--alert-critical-bg);
            color: var(--alert-critical);
            border-color: var(--alert-critical-border);
            animation: badgePulse 1.5s ease-in-out infinite;
        }
        
        @keyframes badgePulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.95); }
        }
        
        .alert-message {
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.6;
            word-break: break-word;
        }
        
        .alert-message strong {
            color: var(--text-primary);
            font-weight: 600;
        }
        
        .alert-message .highlight {
            color: var(--nexus-secondary);
            font-weight: 600;
        }
        
        .alert-message .highlight-danger {
            color: var(--alert-danger);
            font-weight: 600;
        }
        
        .alert-message .highlight-warning {
            color: var(--alert-warning);
            font-weight: 600;
        }
        
        .alert-message .highlight-info {
            color: var(--alert-info);
            font-weight: 600;
        }
        
        /* ============================================
           SECTION 9: ALERT METADATA
           ============================================ */
        .alert-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 6px;
            font-size: 0.6rem;
            color: var(--text-muted);
            flex-wrap: wrap;
        }
        
        .alert-meta .alert-time {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 0.05rem 0.5rem;
            background: rgba(255, 255, 255, 0.02);
            border-radius: var(--radius-full);
        }
        
        .alert-meta .alert-time i {
            font-size: 0.5rem;
        }
        
        .alert-meta .alert-source {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 0.05rem 0.6rem;
            background: rgba(255, 255, 255, 0.02);
            border-radius: var(--radius-full);
            border: 1px solid var(--border-color-light);
        }
        
        .alert-meta .alert-source i {
            font-size: 0.5rem;
        }
        
        .alert-meta .alert-tag {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 0.05rem 0.6rem;
            background: rgba(108, 60, 225, 0.08);
            border-radius: var(--radius-full);
            border: 1px solid var(--alert-info-border);
            color: var(--alert-info);
            font-weight: 500;
        }
        
        .alert-meta .alert-tag i {
            font-size: 0.5rem;
        }
        
        /* ============================================
           SECTION 10: ALERT ACTIONS
           ============================================ */
        .alert-actions {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
            margin-left: auto;
            padding-left: 8px;
        }
        
        .alert-action-btn {
            width: 30px;
            height: 30px;
            border: none;
            background: rgba(255, 255, 255, 0.03);
            border-radius: var(--radius-full);
            color: var(--text-muted);
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            position: relative;
        }
        
        .alert-action-btn::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: var(--radius-full);
            background: var(--gradient-primary);
            opacity: 0;
            transition: opacity var(--transition-fast);
        }
        
        .alert-action-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
            transform: translateY(-1px);
        }
        
        .alert-action-btn:hover::before {
            opacity: 0.1;
        }
        
        .alert-action-btn:active {
            transform: scale(0.9);
        }
        
        .alert-action-btn.dismiss-btn:hover {
            background: var(--alert-danger-bg);
            color: var(--alert-danger);
        }
        
        .alert-action-btn.dismiss-btn:hover::before {
            background: var(--alert-danger);
        }
        
        .alert-action-btn.snooze-btn:hover {
            background: var(--alert-warning-bg);
            color: var(--alert-warning);
        }
        
        .alert-action-btn.action-btn:hover {
            background: var(--alert-info-bg);
            color: var(--alert-info);
        }
        
        .alert-action-btn.execute-btn:hover {
            background: var(--alert-success-bg);
            color: var(--alert-success);
        }
        
        .alert-action-btn.emergency-btn:hover {
            background: var(--alert-critical-bg);
            color: var(--alert-critical);
            animation: emergencyPulse 0.5s ease-in-out 3;
        }
        
        @keyframes emergencyPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        
        /* ============================================
           SECTION 11: ALERT COUNTER
           ============================================ */
        .alert-counter {
            position: fixed;
            top: 76px;
            right: 20px;
            z-index: 10000;
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-full);
            padding: 5px 16px 5px 12px;
            display: none;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(20px);
            box-shadow: var(--shadow-card);
            font-size: 0.75rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition-base);
            pointer-events: auto;
        }
        
        .alert-counter:hover {
            border-color: var(--border-color-hover);
            transform: scale(1.03);
            box-shadow: var(--shadow-card-hover);
        }
        
        .alert-counter:active {
            transform: scale(0.95);
        }
        
        .alert-counter.visible {
            display: flex;
        }
        
        .alert-counter .counter-badge {
            background: var(--gradient-accent);
            color: var(--text-primary);
            font-weight: 700;
            font-size: 0.6rem;
            padding: 0.1rem 0.6rem;
            border-radius: var(--radius-full);
            min-width: 22px;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.2);
        }
        
        .alert-counter .counter-text {
            font-weight: 500;
        }
        
        .alert-counter .counter-icon {
            color: var(--nexus-secondary);
            animation: counterPulse 2s ease-in-out infinite;
        }
        
        @keyframes counterPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        /* ============================================
           SECTION 12: SOUND INDICATOR
           ============================================ */
        .alert-sound-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9998;
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-full);
            padding: 10px 18px;
            backdrop-filter: blur(20px);
            box-shadow: var(--shadow-card);
            display: none;
            align-items: center;
            gap: 10px;
            font-size: 0.7rem;
            color: var(--text-muted);
            animation: alertSlideIn 0.5s ease-out;
            cursor: pointer;
            transition: all var(--transition-base);
            pointer-events: auto;
        }
        
        .alert-sound-indicator:hover {
            border-color: var(--border-color-hover);
            transform: scale(1.02);
        }
        
        .alert-sound-indicator.visible {
            display: flex;
        }
        
        .alert-sound-indicator .sound-wave {
            display: flex;
            align-items: center;
            gap: 2px;
            height: 18px;
        }
        
        .alert-sound-indicator .sound-wave span {
            display: block;
            width: 3px;
            background: var(--nexus-secondary);
            border-radius: var(--radius-full);
            animation: soundWave 0.6s ease-in-out infinite alternate;
        }
        
        .alert-sound-indicator .sound-wave span:nth-child(1) { height: 6px; animation-delay: 0s; }
        .alert-sound-indicator .sound-wave span:nth-child(2) { height: 12px; animation-delay: 0.12s; }
        .alert-sound-indicator .sound-wave span:nth-child(3) { height: 18px; animation-delay: 0.24s; }
        .alert-sound-indicator .sound-wave span:nth-child(4) { height: 12px; animation-delay: 0.36s; }
        .alert-sound-indicator .sound-wave span:nth-child(5) { height: 6px; animation-delay: 0.48s; }
        
        @keyframes soundWave {
            0% { transform: scaleY(0.2); opacity: 0.3; }
            100% { transform: scaleY(1); opacity: 1; }
        }
        
        .alert-sound-indicator .sound-label {
            font-weight: 500;
            color: var(--text-secondary);
        }
        
        .alert-sound-indicator .sound-toggle {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color-light);
            border-radius: var(--radius-full);
            padding: 0.1rem 0.6rem;
            font-size: 0.6rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        
        .alert-sound-indicator .sound-toggle:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }
        
        .alert-sound-indicator .sound-toggle.muted {
            color: var(--alert-danger);
            border-color: var(--alert-danger-border);
        }
        
        /* ============================================
           SECTION 13: ALERT SETTINGS PANEL
           ============================================ */
        .alert-settings-toggle {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 9998;
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-full);
            padding: 10px 16px;
            backdrop-filter: blur(20px);
            box-shadow: var(--shadow-card);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.7rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: all var(--transition-base);
            pointer-events: auto;
        }
        
        .alert-settings-toggle:hover {
            border-color: var(--border-color-hover);
            transform: scale(1.02);
        }
        
        .alert-settings-toggle i {
            color: var(--nexus-secondary);
        }
        
        /* ============================================
           SECTION 14: ALERT HISTORY PANEL
           ============================================ */
        .alert-history-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            z-index: 10001;
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 24px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            backdrop-filter: blur(24px);
            box-shadow: var(--shadow-dropdown), var(--shadow-glow-strong);
            opacity: 0;
            visibility: hidden;
            transition: all var(--transition-bounce);
            pointer-events: none;
            overflow-y: auto;
        }
        
        .alert-history-panel.visible {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: auto;
        }
        
        .alert-history-panel .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color-light);
        }
        
        .alert-history-panel .panel-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .alert-history-panel .panel-close {
            width: 32px;
            height: 32px;
            border: none;
            background: rgba(255, 255, 255, 0.03);
            border-radius: var(--radius-full);
            color: var(--text-muted);
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .alert-history-panel .panel-close:hover {
            background: var(--alert-danger-bg);
            color: var(--alert-danger);
        }
        
        .alert-history-item {
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color-light);
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all var(--transition-fast);
            cursor: pointer;
        }
        
        .alert-history-item:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-color-hover);
        }
        
        .alert-history-item .item-info {
            flex: 1;
            min-width: 0;
        }
        
        .alert-history-item .item-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .alert-history-item .item-time {
            font-size: 0.6rem;
            color: var(--text-muted);
        }
        
        .alert-history-item .item-type-badge {
            font-size: 0.5rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 0.05rem 0.5rem;
            border-radius: var(--radius-full);
            flex-shrink: 0;
        }
        
        .alert-history-item .item-type-badge.type-info {
            background: var(--alert-info-bg);
            color: var(--alert-info);
        }
        .alert-history-item .item-type-badge.type-success {
            background: var(--alert-success-bg);
            color: var(--alert-success);
        }
        .alert-history-item .item-type-badge.type-warning {
            background: var(--alert-warning-bg);
            color: var(--alert-warning);
        }
        .alert-history-item .item-type-badge.type-danger {
            background: var(--alert-danger-bg);
            color: var(--alert-danger);
        }
        .alert-history-item .item-type-badge.type-critical {
            background: var(--alert-critical-bg);
            color: var(--alert-critical);
        }
        
        /* ============================================
           SECTION 15: OVERLAY
           ============================================ */
        .alert-overlay {
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: var(--bg-overlay);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            opacity: 0;
            visibility: hidden;
            transition: all var(--transition-base);
        }
        
        .alert-overlay.visible {
            opacity: 1;
            visibility: visible;
        }
        
        /* ============================================
           SECTION 16: RESPONSIVE
           ============================================ */
        @media (max-width: 1024px) {
            .alerts-container {
                max-width: 400px;
            }
        }
        
        @media (max-width: 768px) {
            .alerts-container {
                top: 68px;
                right: 10px;
                left: 10px;
                max-width: none;
                gap: 10px;
                padding: 2px;
                max-height: calc(100vh - 100px);
            }
            
            .alert-item {
                padding: 14px 16px;
                border-radius: var(--radius-sm);
                border-left-width: 3px;
            }
            
            .alert-title {
                font-size: 0.8rem;
            }
            
            .alert-message {
                font-size: 0.75rem;
            }
            
            .alert-icon-wrapper {
                width: 32px;
                height: 32px;
                font-size: 0.9rem;
            }
            
            .alert-actions {
                gap: 3px;
                padding-left: 4px;
            }
            
            .alert-action-btn {
                width: 26px;
                height: 26px;
                font-size: 0.6rem;
            }
            
            .alert-meta {
                font-size: 0.55rem;
                gap: 6px;
                flex-wrap: wrap;
            }
            
            .alert-meta .alert-source {
                padding: 0.03rem 0.4rem;
            }
            
            .alert-counter {
                top: 64px;
                right: 10px;
                font-size: 0.65rem;
                padding: 4px 12px 4px 10px;
            }
            
            .alert-counter .counter-badge {
                font-size: 0.5rem;
                min-width: 18px;
                padding: 0.05rem 0.4rem;
            }
            
            .alert-sound-indicator {
                bottom: 10px;
                right: 10px;
                padding: 8px 14px;
                font-size: 0.6rem;
            }
            
            .alert-settings-toggle {
                bottom: 10px;
                left: 10px;
                padding: 8px 12px;
                font-size: 0.6rem;
            }
            
            .alert-history-panel {
                padding: 16px;
                max-width: 95%;
                max-height: 85vh;
            }
            
            .alert-history-panel .panel-title {
                font-size: 0.95rem;
            }
            
            .alert-history-item {
                padding: 8px 10px;
            }
            
            .alert-history-item .item-title {
                font-size: 0.75rem;
            }
        }
        
        @media (max-width: 480px) {
            .alerts-container {
                top: 60px;
                right: 6px;
                left: 6px;
                gap: 8px;
                padding: 0;
            }
            
            .alert-item {
                padding: 12px 14px;
                border-left-width: 3px;
                border-radius: var(--radius-sm);
            }
            
            .alert-title {
                font-size: 0.75rem;
                gap: 4px;
            }
            
            .alert-title .alert-badge {
                font-size: 0.4rem;
                padding: 0.05rem 0.4rem;
            }
            
            .alert-message {
                font-size: 0.7rem;
            }
            
            .alert-icon-wrapper {
                width: 28px;
                height: 28px;
                font-size: 0.8rem;
            }
            
            .alert-content {
                gap: 10px;
            }
            
            .alert-actions {
                gap: 2px;
            }
            
            .alert-action-btn {
                width: 22px;
                height: 22px;
                font-size: 0.5rem;
            }
            
            .alert-meta .alert-source {
                display: none;
            }
            
            .alert-meta .alert-tag {
                display: none;
            }
            
            .alert-counter {
                top: 56px;
                right: 6px;
                font-size: 0.55rem;
                padding: 3px 8px 3px 6px;
                gap: 6px;
            }
            
            .alert-counter .counter-badge {
                font-size: 0.45rem;
                min-width: 16px;
                padding: 0.03rem 0.3rem;
            }
            
            .alert-sound-indicator {
                bottom: 6px;
                right: 6px;
                padding: 6px 10px;
                font-size: 0.55rem;
                gap: 6px;
            }
            
            .alert-sound-indicator .sound-wave {
                height: 14px;
                gap: 1px;
            }
            
            .alert-sound-indicator .sound-wave span:nth-child(3) {
                height: 14px;
            }
            
            .alert-settings-toggle {
                bottom: 6px;
                left: 6px;
                padding: 6px 10px;
                font-size: 0.55rem;
            }
        }
        
        /* ============================================
           SECTION 17: UTILITY ANIMATIONS
           ============================================ */
        .fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .slide-up {
            animation: slideUp 0.4s ease-out forwards;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .shake {
            animation: shake 0.5s ease-out;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-6px); }
            80% { transform: translateX(6px); }
        }
        
        .zoom-in {
            animation: zoomIn 0.3s ease-out forwards;
        }
        
        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    
    <!-- ============================================
    SECTION 18: OVERLAY
    ============================================ -->
    <div class="alert-overlay" id="alertOverlay"></div>
    
    <!-- ============================================
    SECTION 19: ALERT COUNTER
    ============================================ -->
    <div class="alert-counter" id="alertCounter" title="Click to view all alerts">
        <span class="counter-icon"><i class="fas fa-bell"></i></span>
        <span class="counter-badge" id="counterBadge">0</span>
        <span class="counter-text">Alerts</span>
    </div>
    
    <!-- ============================================
    SECTION 20: ALERTS CONTAINER
    ============================================ -->
    <div class="alerts-container" id="alertsContainer"></div>
    
    <!-- ============================================
    SECTION 21: SOUND INDICATOR
    ============================================ -->
    <div class="alert-sound-indicator" id="soundIndicator">
        <div class="sound-wave">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>
        <span class="sound-label">Alert Sound</span>
        <button class="sound-toggle" id="soundToggle">ON</button>
    </div>
    
    <!-- ============================================
    SECTION 22: SETTINGS TOGGLE
    ============================================ -->
    <div class="alert-settings-toggle" id="settingsToggle" title="Alert Settings">
        <i class="fas fa-sliders-h"></i>
        <span>Settings</span>
    </div>
    
    <!-- ============================================
    SECTION 23: HISTORY PANEL
    ============================================ -->
    <div class="alert-history-panel" id="historyPanel">
        <div class="panel-header">
            <span class="panel-title"><i class="fas fa-history" style="margin-right: 10px; color: var(--nexus-secondary);"></i>Alert History</span>
            <button class="panel-close" id="historyClose"><i class="fas fa-times"></i></button>
        </div>
        <div id="historyList">
            <div style="text-align: center; color: var(--text-muted); padding: 40px 0; font-size: 0.85rem;">
                <i class="fas fa-inbox" style="font-size: 2rem; display: block; margin-bottom: 12px; opacity: 0.3;"></i>
                No alert history available
            </div>
        </div>
    </div>
    
    <!-- ============================================
    SECTION 24: JAVASCRIPT - COMPLETE
    ============================================ -->
    <script>
        'use strict';
        
        // ============================================
        // SECTION 25: CONFIGURATION
        // ============================================
        const ALERT_CONFIG = {
            API_BASE: '/api/v1',
            WS_URL: 'wss://' + window.location.host + '/ws/alerts',
            REFRESH_INTERVAL: 5000,
            MAX_ALERTS: 50,
            DEFAULT_DURATION: 8000,
            CRITICAL_DURATION: 15000,
            SUCCESS_DURATION: 6000,
            SOUND_ENABLED: true,
            DESKTOP_NOTIFICATIONS: true,
            HISTORY_LIMIT: 100,
            AUTO_DISMISS: true,
        };
        
        // ============================================
        // SECTION 26: DOM REFS
        // ============================================
        const ALERT_DOM = {
            container: document.getElementById('alertsContainer'),
            counter: document.getElementById('alertCounter'),
            counterBadge: document.getElementById('counterBadge'),
            soundIndicator: document.getElementById('soundIndicator'),
            soundToggle: document.getElementById('soundToggle'),
            settingsToggle: document.getElementById('settingsToggle'),
            historyPanel: document.getElementById('historyPanel'),
            historyClose: document.getElementById('historyClose'),
            historyList: document.getElementById('historyList'),
            overlay: document.getElementById('alertOverlay'),
        };
        
        // ============================================
        // SECTION 27: STATE
        // ============================================
        const ALERT_STATE = {
            alerts: [],
            activeAlerts: [],
            history: [],
            idCounter: 0,
            isConnected: false,
            soundEnabled: true,
            notificationsEnabled: true,
            muted: false,
            isHistoryOpen: false,
            isSettingsOpen: false,
            soundContext: null,
        };
        
        // ============================================
        // SECTION 28: ALERT FACTORY
        // ============================================
        class AlertFactory {
            static create(data) {
                const defaults = {
                    id: ++ALERT_STATE.idCounter,
                    type: 'info',
                    title: 'System Alert',
                    message: 'No details provided',
                    duration: ALERT_CONFIG.DEFAULT_DURATION,
                    source: 'System',
                    time: new Date(),
                    actions: [],
                    metadata: {},
                    read: false,
                    dismissed: false,
                };
                
                return { ...defaults, ...data };
            }
            
            static createOpportunity(data) {
                return this.create({
                    type: 'success',
                    title: '🚀 Arbitrage Opportunity',
                    message: `Found <strong>${data.pair}</strong> opportunity with <span class="highlight">${data.spread}%</span> spread on <span class="highlight">${data.exchange}</span>`,
                    duration: ALERT_CONFIG.SUCCESS_DURATION,
                    source: 'Arbitrage Engine',
                    actions: [
                        { label: 'Execute', action: 'execute_arbitrage', icon: 'fa-rocket', class: 'execute-btn' },
                        { label: 'Snooze', action: 'snooze', icon: 'fa-clock', class: 'snooze-btn' },
                    ],
                    metadata: {
                        pair: data.pair,
                        spread: data.spread,
                        exchange: data.exchange,
                        profit: data.profit,
                        profitUsd: data.profitUsd,
                    },
                });
            }
            
            static createRisk(data) {
                return this.create({
                    type: 'danger',
                    title: '⚠️ Risk Alert',
                    message: `Risk limit <strong>${data.limit}</strong> exceeded at <span class="highlight-danger">${data.value}</span>`,
                    duration: ALERT_CONFIG.DEFAULT_DURATION,
                    source: 'Risk Engine',
                    actions: [
                        { label: 'View', action: 'view_risk', icon: 'fa-chart-line', class: 'action-btn' },
                        { label: 'Dismiss', action: 'dismiss', icon: 'fa-times', class: 'dismiss-btn' },
                    ],
                    metadata: data,
                });
            }
            
            static createSystem(data) {
                const typeMap = {
                    'error': 'danger',
                    'critical': 'critical',
                    'warning': 'warning',
                    'info': 'info',
                    'success': 'success',
                };
                
                return this.create({
                    type: typeMap[data.level] || 'info',
                    title: data.title || 'System Notification',
                    message: data.message,
                    duration: data.level === 'critical' ? ALERT_CONFIG.CRITICAL_DURATION : ALERT_CONFIG.DEFAULT_DURATION,
                    source: 'System',
                    actions: [
                        { label: 'Details', action: 'view_details', icon: 'fa-info-circle', class: 'action-btn' },
                        { label: 'Dismiss', action: 'dismiss', icon: 'fa-times', class: 'dismiss-btn' },
                    ],
                    metadata: data,
                });
            }
            
            static createCritical(data) {
                return this.create({
                    type: 'critical',
                    title: '🔴 CRITICAL: ' + data.title,
                    message: data.message,
                    duration: ALERT_CONFIG.CRITICAL_DURATION,
                    source: 'Critical System',
                    actions: [
                        { label: 'Emergency Stop', action: 'emergency', icon: 'fa-exclamation-triangle', class: 'emergency-btn' },
                        { label: 'Dismiss', action: 'dismiss', icon: 'fa-times', class: 'dismiss-btn' },
                    ],
                    metadata: data,
                });
            }
            
            static createTrade(data) {
                return this.create({
                    type: data.profit > 0 ? 'success' : 'danger',
                    title: data.profit > 0 ? '✅ Trade Executed' : '❌ Trade Executed',
                    message: `Trade <strong>${data.pair}</strong> executed with <span class="${data.profit > 0 ? 'highlight' : 'highlight-danger'}">${data.profit > 0 ? '+' : ''}${data.profit}%</span>`,
                    duration: ALERT_CONFIG.SUCCESS_DURATION,
                    source: 'Execution Engine',
                    actions: [
                        { label: 'View Trade', action: 'view_trade', icon: 'fa-receipt', class: 'action-btn' },
                        { label: 'Dismiss', action: 'dismiss', icon: 'fa-times', class: 'dismiss-btn' },
                    ],
                    metadata: data,
                });
            }
        }
        
        // ============================================
        // SECTION 29: ALERT RENDERER
        // ============================================
        class AlertRenderer {
            static render(alert) {
                const el = document.createElement('div');
                el.className = `alert-item type-${alert.type}`;
                el.dataset.id = alert.id;
                el.setAttribute('role', 'alert');
                el.setAttribute('aria-live', alert.type === 'critical' ? 'assertive' : 'polite');
                
                // Mouse move for glow
                el.addEventListener('mousemove', (e) => {
                    const rect = el.getBoundingClientRect();
                    const x = ((e.clientX - rect.left) / rect.width) * 100;
                    const y = ((e.clientY - rect.top) / rect.height) * 100;
                    el.style.setProperty('--mouse-x', x + '%');
                    el.style.setProperty('--mouse-y', y + '%');
                });
                
                const iconMap = {
                    info: 'fa-info-circle',
                    success: 'fa-check-circle',
                    warning: 'fa-exclamation-triangle',
                    danger: 'fa-times-circle',
                    critical: 'fa-skull-crossbones',
                };
                
                const icon = iconMap[alert.type] || 'fa-bell';
                
                el.innerHTML = `
                    <div class="alert-content">
                        <div class="alert-icon-wrapper">
                            <i class="fas ${icon} alert-icon"></i>
                        </div>
                        <div class="alert-text">
                            <div class="alert-title">
                                ${alert.title}
                                <span class="alert-badge">${alert.type.toUpperCase()}</span>
                            </div>
                            <div class="alert-message">${alert.message}</div>
                            <div class="alert-meta">
                                <span class="alert-time">
                                    <i class="fas fa-clock"></i>
                                    ${this.formatTime(alert.time)}
                                </span>
                                <span class="alert-source">
                                    <i class="fas fa-robot"></i>
                                    ${alert.source}
                                </span>
                                ${alert.metadata.pair ? `<span class="alert-tag"><i class="fas fa-coins"></i> ${alert.metadata.pair}</span>` : ''}
                                ${alert.metadata.spread ? `<span class="alert-tag"><i class="fas fa-percent"></i> ${alert.metadata.spread}%</span>` : ''}
                            </div>
                        </div>
                        <div class="alert-actions">
                            ${alert.actions.map(action => `
                                <button class="alert-action-btn ${action.class || ''}" data-action="${action.action}" data-id="${alert.id}" title="${action.label}">
                                    <i class="fas ${action.icon}"></i>
                                </button>
                            `).join('')}
                            <button class="alert-action-btn dismiss-btn" data-action="dismiss" data-id="${alert.id}" title="Dismiss">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                    </div>
                    <div class="alert-progress">
                        <div class="alert-progress-bar" style="animation: none; width: 100%;"></div>
                    </div>
                `;
                
                // Event listeners for actions
                el.querySelectorAll('.alert-action-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const action = btn.dataset.action;
                        const id = parseInt(btn.dataset.id);
                        this.handleAction(id, action);
                    });
                });
                
                // Click on alert to expand details
                el.addEventListener('click', (e) => {
                    if (!e.target.closest('.alert-action-btn')) {
                        this.handleAction(alert.id, 'expand');
                    }
                });
                
                // Progress bar
                this.startProgress(el, alert.duration || ALERT_CONFIG.DEFAULT_DURATION);
                
                return el;
            }
            
            static formatTime(date) {
                const d = new Date(date);
                const now = new Date();
                const diff = Math.floor((now - d) / 1000);
                
                if (diff < 60) return 'Just now';
                if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
                if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
                return d.toLocaleDateString() + ' ' + d.toLocaleTimeString();
            }
            
            static startProgress(el, duration) {
                const progressBar = el.querySelector('.alert-progress-bar');
                let startTime = Date.now();
                let paused = false;
                let pauseTime = 0;
                
                const updateProgress = () => {
                    if (paused) return;
                    const elapsed = Date.now() - startTime;
                    const progress = Math.max(0, 1 - (elapsed / duration));
                    progressBar.style.width = (progress * 100) + '%';
                    
                    if (progress <= 0) {
                        this.dismiss(parseInt(el.dataset.id));
                    } else {
                        requestAnimationFrame(updateProgress);
                    }
                };
                
                el.addEventListener('mouseenter', () => {
                    paused = true;
                    progressBar.classList.add('paused');
                    pauseTime = Date.now();
                });
                
                el.addEventListener('mouseleave', () => {
                    paused = false;
                    progressBar.classList.remove('paused');
                    const elapsed = Date.now() - startTime;
                    const remainingTime = duration - elapsed;
                    if (remainingTime > 0) {
                        startTime = Date.now();
                        requestAnimationFrame(updateProgress);
                    }
                });
                
                requestAnimationFrame(updateProgress);
            }
            
            static handleAction(id, action) {
                const alert = ALERT_STATE.activeAlerts.find(a => a.id === id);
                if (!alert) return;
                
                switch(action) {
                    case 'dismiss':
                        this.dismiss(id);
                        break;
                    case 'execute_arbitrage':
                        console.log('[ALERT] Executing arbitrage for alert', id, alert);
                        this.showToast('Executing arbitrage...', 'info');
                        // API call would go here
                        break;
                    case 'view_risk':
                        console.log('[ALERT] Viewing risk details', id);
                        this.showToast('Opening risk dashboard...', 'info');
                        break;
                    case 'view_details':

        // SECTION 30: ALERT MANAGER
        // ============================================
        class AlertManager {
            static add(data) {
                const alert = typeof data === 'object' && data.type 
                    ? data 
                    : AlertFactory.create(data);
                
                // Check for duplicate (same title and message within 5 seconds)
                const exists = ALERT_STATE.activeAlerts.some(a => 
                    a.title === alert.title && 
                    a.message === alert.message &&
                    a.type === alert.type &&
                    Math.abs(new Date(a.time) - new Date(alert.time)) < 5000
                );
                
                if (exists) {
                    // Update existing alert instead
                    const existing = ALERT_STATE.activeAlerts.find(a => 
                        a.title === alert.title && a.message === alert.message
                    );
                    if (existing) {
                        // Bump the alert
                        const el = ALERT_DOM.container.querySelector(`[data-id="${existing.id}"]`);
                        if (el) {
                            el.style.animation = 'none';
                            setTimeout(() => {
                                el.style.animation = 'alertSlideIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards';
                            }, 10);
                        }
                    }
                    return null;
                }
                
                ALERT_STATE.activeAlerts.push(alert);
                ALERT_STATE.history.unshift({ ...alert, dismissedAt: null });
                
                // Limit alerts
                if (ALERT_STATE.activeAlerts.length > ALERT_CONFIG.MAX_ALERTS) {
                    const oldest = ALERT_STATE.activeAlerts.shift();
                    AlertRenderer.dismiss(oldest.id);
                }
                
                // Limit history
                if (ALERT_STATE.history.length > ALERT_CONFIG.HISTORY_LIMIT) {
                    ALERT_STATE.history = ALERT_STATE.history.slice(0, ALERT_CONFIG.HISTORY_LIMIT);
                }
                
                // Render
                const el = AlertRenderer.render(alert);
                ALERT_DOM.container.prepend(el);
                
                // Update counter
                AlertRenderer.updateCounter();
                
                // Sound
                if (ALERT_STATE.soundEnabled && !ALERT_STATE.muted) {
                    this.playSound(alert.type);
                }
                
                // Desktop notification
                if (ALERT_CONFIG.DESKTOP_NOTIFICATIONS && 
                    'Notification' in window && 
                    Notification.permission === 'granted') {
                    this.sendDesktopNotification(alert);
                }
                
                // Log
                console.log(`[ALERT] ${alert.type.toUpperCase()}: ${alert.title}`, alert);
                
                return alert;
            }
            
            static addOpportunity(data) {
                return this.add(AlertFactory.createOpportunity(data));
            }
            
            static addRisk(data) {
                return this.add(AlertFactory.createRisk(data));
            }
            
            static addSystem(data) {
                return this.add(AlertFactory.createSystem(data));
            }
            
            static addCritical(data) {
                return this.add(AlertFactory.createCritical(data));
            }
            
            static addTrade(data) {
                return this.add(AlertFactory.createTrade(data));
            }
            
            static playSound(type) {
                try {
                    if (!ALERT_STATE.soundContext) {
                        ALERT_STATE.soundContext = new (window.AudioContext || window.webkitAudioContext)();
                    }
                    
                    const ctx = ALERT_STATE.soundContext;
                    const frequencies = {
                        info: [523, 659],
                        success: [523, 659, 784],
                        warning: [440, 349, 440],
                        danger: [349, 293, 261],
                        critical: [262, 220, 174, 220],
                    };
                    
                    const freqs = frequencies[type] || frequencies.info;
                    
                    freqs.forEach((freq, i) => {
                        const oscillator = ctx.createOscillator();
                        const gainNode = ctx.createGain();
                        
                        oscillator.connect(gainNode);
                        gainNode.connect(ctx.destination);
                        
                        oscillator.frequency.value = freq;
                        oscillator.type = 'sine';
                        
                        const startTime = ctx.currentTime + i * 0.08;
                        gainNode.gain.setValueAtTime(0.12, startTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.001, startTime + 0.2);
                        
                        oscillator.start(startTime);
                        oscillator.stop(startTime + 0.2);
                    });
                } catch (e) {
                    // Silently fail for audio
                }
            }
            
            static sendDesktopNotification(alert) {

                    notification.onclick = () => {

        // ============================================
        // SECTION 31: WEBSOCKET CONNECTION
        // ============================================
        class AlertWebSocket {
            constructor() {
                this.ws = null;
                this.reconnectAttempts = 0;
                this.maxReconnectAttempts = 15;
                this.reconnectDelay = 1000;
                this.isConnecting = false;
                this.heartbeatInterval = null;
            }
            
            connect() {
                if (this.isConnecting) return;
                if (this.ws && this.ws.readyState === WebSocket.OPEN) return;
                
                this.isConnecting = true;
                
                try {
                    this.ws = new WebSocket(ALERT_CONFIG.WS_URL);
                    
                    this.ws.onopen = this.handleOpen.bind(this);
                    this.ws.onmessage = this.handleMessage.bind(this);
                    this.ws.onclose = this.handleClose.bind(this);
                    this.ws.onerror = this.handleError.bind(this);
                } catch (e) {
                    console.error('[WS] Connection error:', e);
                    this.handleReconnect();
                }
            }
            
            handleOpen() {
                console.log('[WS] Connected to alert stream');
                this.isConnecting = false;
                this.reconnectAttempts = 0;
                ALERT_STATE.isConnected = true;
                
                // Start heartbeat
                this.heartbeatInterval = setInterval(() => {
                    this.sendPing();
                }, 30000);
                
                AlertRenderer.showToast('🔌 Connected to alert stream', 'success');
            }
            
            handleMessage(event) {
                try {
                    const data = JSON.parse(event.data);
                    
                    switch(data.type) {
                        case 'arbitrage_opportunity':
                            AlertManager.addOpportunity(data.data);
                            break;
                        case 'risk_alert':
                            AlertManager.addRisk(data.data);
                            break;
                        case 'system_alert':
                            AlertManager.addSystem(data.data);
                            break;
                        case 'critical_alert':
                            AlertManager.addCritical(data.data);
                            break;
                        case 'trade_alert':
                            AlertManager.addTrade(data.data);
                            break;
                        case 'ping':
                            this.sendPong();
                            break;
                        case 'pong':
                            // Heartbeat received
                            break;
                        default:
                            AlertManager.add(data);
                    }
                } catch (e) {
                    console.error('[WS] Error processing message:', e);
                }
            }
            
            handleClose(event) {
                console.warn('[WS] Connection closed:', event.code, event.reason);
                ALERT_STATE.isConnected = false;
                this.isConnecting = false;
                
                if (this.heartbeatInterval) {
                    clearInterval(this.heartbeatInterval);
                    this.heartbeatInterval = null;
                }
                
                if (event.code !== 1000) {
                    this.handleReconnect();
                }
            }
            
            handleError(error) {
                console.error('[WS] Error:', error);
                this.isConnecting = false;
            }
            
            handleReconnect() {
                if (this.reconnectAttempts >= this.maxReconnectAttempts) {
                    console.error('[WS] Max reconnect attempts reached');
                    AlertRenderer.showToast('❌ Alert stream disconnected', 'danger');
                    return;
                }
                
                this.reconnectAttempts++;
                const delay = Math.min(
                    this.reconnectDelay * Math.pow(1.5, this.reconnectAttempts - 1),
                    30000
                );
                
                console.log(`[WS] Reconnecting in ${delay}ms (attempt ${this.reconnectAttempts})`);
                
                setTimeout(() => {
                    this.connect();
                }, delay);
            }
            
            sendPing() {
                if (this.ws && this.ws.readyState === WebSocket.OPEN) {
                    this.ws.send(JSON.stringify({ type: 'ping' }));
                }
            }
            
            sendPong() {
                if (this.ws && this.ws.readyState === WebSocket.OPEN) {
                    this.ws.send(JSON.stringify({ type: 'pong' }));
                }
            }
            
            disconnect() {
                if (this.heartbeatInterval) {
                    clearInterval(this.heartbeatInterval);
                    this.heartbeatInterval = null;
                }
                if (this.ws) {
                    this.ws.close(1000, 'Client disconnect');
                    this.ws = null;
                }
                ALERT_STATE.isConnected = false;
            }
        }
