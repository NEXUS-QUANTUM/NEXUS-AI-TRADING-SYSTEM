                              ALERT_CONFIG.DEFAULT_DURATION,
                    metadata: {
                        pair: pairs[Math.floor(Math.random() * pairs.length)],
                        spread: (1 + Math.random() * 4).toFixed(2),
                        exchange: exchanges[Math.floor(Math.random() * exchanges.length)],
                        profit: (1 + Math.random() * 3).toFixed(2),
                        profitUsd: Math.round(100 + Math.random() * 1000),
                    },
                };
            }
            
            static startDemo(interval = 10000, maxAlerts = 20) {
                let count = 0;
                
                const timer = setInterval(() => {
                    if (count >= maxAlerts) {
                        clearInterval(timer);
                        AlertRenderer.showToast('🎯 Demo completed', 'success');
                        return;
                    }
                    
                    const alert = this.generate();
                    AlertManager.add(alert);
                    count++;
                }, interval);
                
                return timer;
            }
        }
        
        // ============================================
        // SECTION 34: UI EVENT HANDLERS
        // ============================================
        // Counter click - show history
        ALERT_DOM.counter.addEventListener('click', () => {
            AlertHistory.togglePanel();
        });
        
        // Sound toggle
        ALERT_DOM.soundToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            AlertManager.toggleSound();
        });
        
        // Sound indicator click
        ALERT_DOM.soundIndicator.addEventListener('click', () => {
            AlertManager.toggleSound();
        });
        
        // Settings toggle
        ALERT_DOM.settingsToggle.addEventListener('click', () => {
            // Simple settings menu
            const menu = document.createElement('div');
            menu.style.cssText = `
                position: fixed;
                bottom: 70px;
                left: 20px;
                background: var(--bg-elevated);
                border: 1px solid var(--border-color);
                border-radius: var(--radius-md);
                padding: 12px 16px;
                backdrop-filter: blur(20px);
                box-shadow: var(--shadow-dropdown);
                z-index: 9999;
                min-width: 200px;
                animation: slideUp 0.3s ease-out;
            `;
            menu.innerHTML = `
                <div style="font-weight: 600; color: var(--text-primary); margin-bottom: 10px; font-size: 0.8rem;">
                    <i class="fas fa-sliders-h" style="margin-right: 8px; color: var(--nexus-secondary);"></i>Alert Settings
                </div>
                <div style="display: flex; flex-direction: column; gap: 6px; font-size: 0.75rem;">
                    <label style="display: flex; justify-content: space-between; align-items: center; color: var(--text-secondary); cursor: pointer;">
                        <span>🔊 Sound</span>
                        <input type="checkbox" ${ALERT_STATE.soundEnabled ? 'checked' : ''} id="settingsSound">
                    </label>
                    <label style="display: flex; justify-content: space-between; align-items: center; color: var(--text-secondary); cursor: pointer;">
                        <span>🔔 Notifications</span>
                        <input type="checkbox" ${ALERT_STATE.notificationsEnabled ? 'checked' : ''} id="settingsNotifications">
                    </label>
                    <label style="display: flex; justify-content: space-between; align-items: center; color: var(--text-secondary); cursor: pointer;">
                        <span>🔇 Mute All</span>
                        <input type="checkbox" ${ALERT_STATE.muted ? 'checked' : ''} id="settingsMute">
                    </label>
                    <div style="border-top: 1px solid var(--border-color-light); margin: 6px 0; padding-top: 6px;">
                        <button id="settingsClear" style="background: none; border: none; color: var(--alert-danger); cursor: pointer; font-size: 0.75rem; width: 100%; text-align: left; padding: 4px 0;">
                            <i class="fas fa-trash"></i> Clear All Alerts
                        </button>
                    </div>
                    <div>
                        <button id="settingsDemo" style="background: none; border: none; color: var(--nexus-secondary); cursor: pointer; font-size: 0.75rem; width: 100%; text-align: left; padding: 4px 0;">
                            <i class="fas fa-flask"></i> Generate Demo Alert
                        </button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(menu);
            
            // Close on click outside
            const closeMenu = (e) => {
                if (!menu.contains(e.target) && e.target !== ALERT_DOM.settingsToggle) {
                    menu.remove();
                    document.removeEventListener('click', closeMenu);
                }
            };
            
            setTimeout(() => {
                document.addEventListener('click', closeMenu);
            }, 100);
            
            // Event handlers for settings
            menu.querySelector('#settingsSound').addEventListener('change', (e) => {
                if (!e.target.checked) {
                    AlertManager.toggleSound();
                } else {
                    AlertManager.toggleSound();
                }
            });
            
            menu.querySelector('#settingsNotifications').addEventListener('change', (e) => {
                AlertManager.toggleNotifications();
            });
            
            menu.querySelector('#settingsMute').addEventListener('change', (e) => {
                AlertManager.toggleMute();
            });
            
            menu.querySelector('#settingsClear').addEventListener('click', () => {
                AlertManager.clearAll();
                menu.remove();
            });
            
            menu.querySelector('#settingsDemo').addEventListener('click', () => {
                AlertManager.add(AlertDemo.generate());
                menu.remove();
            });
        });
        
        // History panel close
        ALERT_DOM.historyClose.addEventListener('click', AlertHistory.togglePanel);
        ALERT_DOM.overlay.addEventListener('click', AlertHistory.togglePanel);
        
        // ESC key to close history
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && ALERT_STATE.isHistoryOpen) {
                AlertHistory.togglePanel();
            }
        });
        
        // ============================================
        // SECTION 35: KEYBOARD SHORTCUTS
        // ============================================
        document.addEventListener('keydown', (e) => {
            // Ctrl+Shift+A - Demo alert
            if (e.ctrlKey && e.shiftKey && e.key === 'A') {
                e.preventDefault();
                AlertManager.add(AlertDemo.generate());
                AlertRenderer.showToast('🎯 Demo alert generated', 'info');
            }
            
            // Ctrl+Shift+M - Mute toggle
            if (e.ctrlKey && e.shiftKey && e.key === 'M') {
                e.preventDefault();
                AlertManager.toggleMute();
            }
            
            // Ctrl+Shift+H - History
            if (e.ctrlKey && e.shiftKey && e.key === 'H') {
                e.preventDefault();
                AlertHistory.togglePanel();
            }
            
            // Escape - Clear all if any alerts
            if (e.key === 'Escape' && ALERT_STATE.activeAlerts.length > 0 && !ALERT_STATE.isHistoryOpen) {
                AlertManager.clearAll();
            }
        });
        
        // ============================================
        // SECTION 36: INITIALIZATION
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            console.log('[ALERT] Initializing alert system...');
            console.log(`[ALERT] Version: 3.0.0 - Build: 2026.07.20`);
            
            // Request notification permission
            if ('Notification' in window && ALERT_CONFIG.DESKTOP_NOTIFICATIONS) {
                if (Notification.permission === 'default') {
                    Notification.requestPermission();
                }
            }
            
            // Load alert history
            AlertHistory.loadHistory();
            
            // Connect WebSocket
            const ws = new AlertWebSocket();
            ws.connect();
            
            // Show sound indicator if enabled
            if (ALERT_STATE.soundEnabled) {
                ALERT_DOM.soundIndicator.classList.add('visible');
            }
            
            // Expose globally for debugging
            window.__NEXUS_ALERTS = {
                manager: AlertManager,
                renderer: AlertRenderer,
                factory: AlertFactory,
                config: ALERT_CONFIG,
                state: ALERT_STATE,
                ws: ws,
                demo: AlertDemo,
                history: AlertHistory,
                clear: AlertManager.clearAll,
                toggleSound: AlertManager.toggleSound,
                toggleNotifications: AlertManager.toggleNotifications,
                toggleMute: AlertManager.toggleMute,
            };
            
            console.log('[ALERT] System initialized successfully');
            console.log('[ALERT] Keyboard shortcuts:');
            console.log('  - Ctrl+Shift+A: Demo alert');
            console.log('  - Ctrl+Shift+M: Mute/unmute');
            console.log('  - Ctrl+Shift+H: History panel');
            console.log('  - ESC: Clear all alerts');
            
            // Optional: Start demo after 3 seconds
            // setTimeout(() => {
            //     AlertDemo.startDemo(12000, 10);
            // }, 3000);
        });
        
        // ============================================
        // SECTION 37: ERROR HANDLING
        // ============================================
        window.addEventListener('error', (e) => {
            console.error('[ALERT] Global error:', e.error);
            // Could send to error tracking service
        });
        
        window.addEventListener('unhandledrejection', (e) => {
            console.error('[ALERT] Unhandled rejection:', e.reason);
        });
        
        // ============================================
        // SECTION 38: CLEANUP
        // ============================================
        window.addEventListener('beforeunload', () => {
            // Close WebSocket
            if (window.__NEXUS_ALERTS && window.__NEXUS_ALERTS.ws) {
                window.__NEXUS_ALERTS.ws.disconnect();
            }
        });
    </script>
    
</body>
</html>
