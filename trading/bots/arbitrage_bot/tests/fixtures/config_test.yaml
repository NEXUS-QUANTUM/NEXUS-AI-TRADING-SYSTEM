    min_order_size:
      BTC_USDT: 0.0001
      ETH_USDT: 0.001
      default: 0.001
      
    lot_size:
      BTC_USDT: 0.00001
      ETH_USDT: 0.0001
      default: 0.0001
      
    quote_precision:
      BTC_USDT: 2
      ETH_USDT: 2
      default: 2
      
    base_precision:
