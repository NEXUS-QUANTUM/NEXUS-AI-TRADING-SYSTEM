# ============================================================
# STRATEGY GENERAL SETTINGS
# ============================================================
strategy:
  enabled: true
  version: "2.0.0"
  environment: "production"
  max_concurrent_strategies: 5
  strategy_timeout: 60  # seconds
  default_timeframe: "1m"
  
# ============================================================
# CROSS-EXCHANGE ARBITRAGE STRATEGY
# ============================================================
cross_exchange:
  enabled: true
  name: "Cross-Exchange Arbitrage"
  description: "Exploite les différences de prix entre les exchanges"
  type: "arbitrage"
  priority: 1
  
  # General parameters
  parameters:
    min_profit_threshold: 0.005  # 0.5%
    max_spread_percentage: 0.15  # 15%
    min_volume_threshold: 1000  # USD
    max_position_size: 50000  # USD
    execution_timeout: 30  # seconds
    max_execution_attempts: 3
    min_time_between_trades: 10  # seconds
    max_trades_per_minute: 5
    slippage_tolerance: 0.002  # 0.2%
    
  # Profit optimization
  profit_optimization:
    enabled: true
    type: "adaptive"  # fixed | adaptive | dynamic
    min_profit_adjustment: 0.001
    max_profit_adjustment: 0.01
    adjustment_period: 60  # minutes
    volatility_factor: 0.5
    
  # Pair-specific settings
