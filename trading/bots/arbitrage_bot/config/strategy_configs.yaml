# ============================================================
# STATISTICAL ARBITRAGE STRATEGY
# ============================================================
statistical:
  enabled: true
  name: "Statistical Arbitrage"
  description: "Utilise des modèles statistiques pour identifier les opportunités"
  type: "statistical_arbitrage"
  priority: 3
  
  # General parameters
  parameters:
    min_profit_threshold: 0.010  # 1%
    lookback_period: 100  # candles
    cointegration_confidence: 0.95
    z_score_threshold: 2.0
    half_life: 20  # periods
    max_position_size: 20000  # USD
    min_time_between_trades: 15  # seconds
    max_trades_per_day: 20
    
  # Model parameters
  model:
    type: "cointegration"  # cointegration | correlation | machine_learning
    methods:
      - "engle_granger"
      - "johansen"
      - "kalman_filter"
      - "ornstein_uhlenbeck"
    update_frequency: 3600  # seconds (1 hour)
    retrain_frequency: 86400  # seconds (24 hours)
    
  # Indicator parameters
  indicators:
    - name: "z_score"
      period: 20
      threshold: 2.0
    - name: "moving_average"
      period: 50
      type: "sma"  # sma | ema
    - name: "bollinger_bands"
      period: 20
      std_dev: 2.0
    - name: "rsi"
      period: 14
      overbought: 70
      oversold: 30
      
  # Pairs
  pairs:
    - pair1: "BTC/USDT"
      pair2: "ETH/USDT"
      hedge_ratio: 0.5
      min_profit: 0.010
      max_position: 20000
      priority: 1
      exchanges:
        - "binance"
        - "bybit"
        
    - pair1: "SOL/USDT"
      pair2: "ADA/USDT"
      hedge_ratio: 0.8
      min_profit: 0.012
      max_position: 15000
      priority: 2
      exchanges:
        - "binance"
        - "bybit"
        - "kucoin"
        
    - pair1: "DOT/USDT"
      pair2: "AVAX/USDT"
      hedge_ratio: 0.7
      min_profit: 0.012
      max_position: 15000
      priority: 3
      exchanges:
        - "binance"
        - "bybit"
        - "kucoin"
        
    - pair1: "MATIC/USDT"
      pair2: "LINK/USDT"
      hedge_ratio: 0.6
      min_profit: 0.015
      max_position: 10000
      priority: 4
      exchanges:
        - "binance"
        - "bybit"
        - "kucoin"
        
    - pair1: "XRP/USDT"
      pair2: "DOGE/USDT"
      hedge_ratio: 0.5
      min_profit: 0.015
      max_position: 10000
      priority: 5
      exchanges:
        - "binance"
        - "bybit"
        - "kucoin"
        
    - pair1: "UNI/USDT"
      pair2: "AAVE/USDT"
      hedge_ratio: 0.6
      min_profit: 0.015
      max_position: 10000
      priority: 6
      exchanges:
        - "binance"
        - "bybit"
        - "kucoin"
        
    - pair1: "ATOM/USDT"
      pair2: "NEAR/USDT"
      hedge_ratio: 0.5
      min_profit: 0.015
      max_position: 10000
      priority: 7
      exchanges:
        - "binance"
        - "bybit"
        - "kucoin"
        
    - pair1: "ARB/USDT"
      pair2: "OP/USDT"
      hedge_ratio: 0.5
      min_profit: 0.018
      max_position: 5000
      priority: 8
      exchanges:
        - "binance"
        - "bybit"
        - "kucoin"
        
    - pair1: "INJ/USDT"
      pair2: "SUI/USDT"
      hedge_ratio: 0.5
      min_profit: 0.020
