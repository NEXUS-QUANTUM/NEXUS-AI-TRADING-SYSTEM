# ============================================================
# STRATEGY SELECTION AND ROUTING
# ============================================================
selection:
  enabled: true
  method: "adaptive"  # fixed | adaptive | machine_learning
  
  # Selection criteria
  criteria:
    - "profitability"
    - "risk_reward"
    - "market_conditions"
    - "available_capital"
    - "strategy_performance"
    
  # Weight configuration
  weights:
    profitability: 0.30
    risk_reward: 0.25
    market_conditions: 0.20
    available_capital: 0.15
    strategy_performance: 0.10
    
  # Performance tracking
  performance_tracking:
    enabled: true
    lookback_period: 30  # days
    update_frequency: 3600  # seconds (1 hour)

# ============================================================
# STRATEGY PERFORMANCE METRICS
# ============================================================
performance:
  enabled: true
  
  # Metrics tracked
  metrics:
    - "total_trades"
    - "win_rate"
    - "total_pnl"
    - "avg_pnl"
    - "sharpe_ratio"
    - "max_drawdown"
    - "profit_factor"
    - "avg_win"
    - "avg_loss"
    - "win_loss_ratio"
    - "consecutive_wins"
    - "consecutive_losses"
    
  # Performance thresholds
  thresholds:
    min_win_rate: 0.50  # 50%
    min_profit_factor: 1.2
    min_sharpe_ratio: 0.5
    max_drawdown: 0.10  # 10%
    
  # Evaluation frequency
  evaluation:
    interval: 3600  # seconds (1 hour)
    min_trades_for_evaluation: 10
    
  # Strategy ranking
  ranking:
    enabled: true
    method: "composite"  # composite | weighted | pareto
    update_frequency: 3600  # seconds (1 hour)

# ============================================================
# STRATEGY BACKTESTING
# ============================================================
backtesting:
  enabled: true
  
  # Backtest parameters
  parameters:
    start_date: "2024-01-01"
    end_date: "2024-12-31"
    initial_balance: 100000
    commission: 0.001
    slippage: 0.002
    latency: 100  # milliseconds
    
  # Optimization
  optimization:
    enabled: true
    iterations: 500
    method: "bayesian"  # random | grid | bayesian
    parameters:
      - name: "min_profit"
        range: [0.001, 0.02]
        step: 0.001
      - name: "max_spread"
        range: [0.10, 0.50]
        step: 0.05
      - name: "position_size"
        range: [100, 10000]
        step: 100
      - name: "stop_loss"
        range: [0.01, 0.05]
        step: 0.005
      - name: "take_profit"
        range: [0.01, 0.05]
        step: 0.005
        
  # Reporting
  reporting:
    enabled: true
    format: "pdf"
    include:
      - "equity_curve"
      - "drawdown_chart"
      - "trade_distribution"
      - "monthly_returns"
      - "performance_metrics"
      - "risk_metrics"

# ============================================================
# STRATEGY COMBINATION
# ============================================================
combination:
  enabled: true
  method: "ensemble"  # ensemble | weighted | stacking
  
  # Combination weights
  weights:
    cross_exchange: 0.40
    triangular: 0.30
    statistical: 0.20
    flash_loan: 0.05
    cross_chain: 0.05
    
  # Risk allocation
  risk_allocation:
    method: "risk_parity"  # risk_parity | equal | weighted
    target_volatility: 0.15  # 15%
    rebalancing_frequency: 86400  # seconds (24 hours)
    
  # Diversification
  diversification:
    enabled: true
    max_correlation: 0.70
    min_strategies: 2
    max_strategies: 5

# ============================================================
# STRATEGY MONITORING
# ============================================================
monitoring:
  enabled: true
  
  # Alert rules
  alerts:
    - name: "strategy_stopped"
      condition: "strategy.is_running == false"
      severity: "warning"
      action: "notify"
      
    - name: "low_win_rate"
      condition: "strategy.win_rate < 0.40"
      severity: "warning"
      action: "notify,reduce"
      
    - name: "high_loss_rate"
      condition: "strategy.daily_loss > 0.02"
      severity: "warning"
      action: "notify,reduce"
      
    - name: "strategy_inactive"
      condition: "strategy.last_trade > 3600"
      severity: "info"
      action: "notify"
      
  # Performance dashboard
  dashboard:
    enabled: true
    update_frequency: 60  # seconds
    metrics_display:
      - "total_pnl"
      - "win_rate"
      - "sharpe_ratio"
      - "max_drawdown"
      - "active_positions"
      - "daily_trades"

# ============================================================
# END OF STRATEGY CONFIGURATIONS
# ============================================================
