# ============================================================
# BOT IDENTITY
# ============================================================
bot:
  id: "arbitrage-bot-prod-001"
  name: "NEXUS Arbitrage Bot"
  version: "2.0.0"
  description: "Bot d'arbitrage algorithmique avancé - Production"
  environment: "production"
  instance: "prod-001"
  deployment: "kubernetes"
  region: "eu-west-1"
  cluster: "nexus-prod"
  
# ============================================================
# GENERAL SETTINGS
# ============================================================
general:
  enabled: true
  debug: false
  log_level: "info"  # debug | info | warning | error | critical
  timezone: "UTC"
  locale: "en_US"
  max_concurrent_operations: 20
  operation_timeout: 30  # seconds
  retry_attempts: 5
  retry_delay: 5  # seconds
  shutdown_timeout: 30  # seconds
  startup_timeout: 60  # seconds
  health_check_interval: 15  # seconds
  enable_profiling: false
  enable_metrics: true
  enable_tracing: true
  graceful_shutdown: true
  emergency_stop: true
  
# ============================================================
# EXCHANGE CONFIGURATIONS - PRODUCTION
# ============================================================
exchanges:
  # --- Binance ---
  binance:
    enabled: true
    name: "Binance"
    type: "cex"
    website: "https://www.binance.com"
    description: "Plus grand exchange de cryptomonnaies au monde"
    priority: 1
    tier: "premium"
    
    api:
      key: "${BINANCE_API_KEY}"
      secret: "${BINANCE_API_SECRET}"
      passphrase: ""
      
    endpoints:
      rest: "https://api.binance.com"
      websocket: "wss://stream.binance.com:9443/ws"
      futures: "https://fapi.binance.com"
      futures_websocket: "wss://fstream.binance.com/ws"
      margin: "https://api.binance.com/sapi/v1"
      options: "https://api.binance.com/eapi/v1"
      withdraw: "https://api.binance.com/wapi/v3"
      sub_account: "https://api.binance.com/sapi/v1/sub-account"
      staking: "https://api.binance.com/sapi/v1/staking"
      
    rate_limits:
      requests_per_second: 50
      orders_per_second: 10
      websocket_connections: 10
      websocket_subscriptions: 1024
      
    options:
      use_spot: true
      use_futures: true
      use_margin: false
      use_options: false
      use_isolated_margin: false
      use_cross_margin: false
      use_dual_side_position: true
      
    trading_pairs:
      spot:
        - "BTC/USDT"
        - "ETH/USDT"
        - "BNB/USDT"
        - "SOL/USDT"
        - "ADA/USDT"
        - "DOT/USDT"
        - "AVAX/USDT"
        - "MATIC/USDT"
        - "LINK/USDT"
        - "UNI/USDT"
        - "ATOM/USDT"
        - "XRP/USDT"
        - "DOGE/USDT"
        - "SHIB/USDT"
        - "TRX/USDT"
        - "ETC/USDT"
        - "LTC/USDT"
        - "BCH/USDT"
        - "NEAR/USDT"
        - "APT/USDT"
        - "ARB/USDT"
        - "OP/USDT"
        - "INJ/USDT"
        - "SUI/USDT"
        - "SEI/USDT"
      futures:
        - "BTC/USDT"
        - "ETH/USDT"
        - "BNB/USDT"
        - "SOL/USDT"
        - "ADA/USDT"
        - "DOT/USDT"
        - "AVAX/USDT"
        - "MATIC/USDT"
        - "LINK/USDT"
        - "XRP/USDT"
        - "DOGE/USDT"
        - "NEAR/USDT"
        - "ARB/USDT"
        - "OP/USDT"
        
    fee:
      maker: 0.001
      taker: 0.001
      futures_maker: 0.0002
      futures_taker: 0.0004
      discount: 0.25  # BNB discount percentage
      discount_asset: "BNB"
      
    min_order_size:
      BTC_USDT: 0.0001
      ETH_USDT: 0.001
      default: 0.001
      
    lot_size:
      BTC_USDT: 0.00001
      ETH_USDT: 0.0001
      default: 0.0001
      
    quote_precision:
      BTC_USDT: 2
      ETH_USDT: 2
      default: 2
      
    base_precision:
      BTC_USDT: 8
      ETH_USDT: 8
      default: 8
      
    security:
      withdraw_whitelist: true
      ip_whitelist: true
      api_key_permissions:
        - "spot"
        - "futures"
        - "margin"
        
    markets:
      - "spot"
      - "futures"
      - "margin"
      
    features:
      - "limit_orders"
      - "market_orders"
      - "stop_orders"
      - "stop_limit_orders"
      - "trailing_stop_orders"
      - "oco_orders"
      - "iceberg_orders"
      - "twap_orders"
      - "post_only"
      - "reduce_only"
      - "close_position"
      
    websocket_streams:
      - "depth"
      - "trade"
      - "kline"
      - "ticker"
      - "bookTicker"
      - "markPrice"
      - "aggTrade"
      
    klines:
      intervals:
        - "1m"
        - "3m"
        - "5m"
        - "15m"
        - "30m"
        - "1h"
        - "2h"
        - "4h"
        - "6h"
        - "8h"
        - "12h"
        - "1d"
        - "3d"
        - "1w"
        - "1M"
      max_limit: 1000
      
    maintenance:
