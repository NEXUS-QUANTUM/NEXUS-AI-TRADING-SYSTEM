# ============================================================
# ARBITRAGE STRATEGIES - DEVELOPMENT
# ============================================================
strategies:
  # --- Cross-Exchange Arbitrage ---
  cross_exchange:
    enabled: true
    name: "Cross-Exchange Arbitrage (Dev)"
    description: "Exploite les différences de prix entre les exchanges - Mode développement"
    min_profit_threshold: 0.003  # 0.3% - Plus bas pour plus d'opportunités
    max_spread_percentage: 0.40  # 40% - Plus large en dev
    min_volume_threshold: 50  # USD - Plus bas en dev
    max_position_size: 1000  # USD - Limité en dev
    execution_timeout: 15  # seconds
    max_execution_attempts: 3
    min_time_between_trades: 5  # seconds
    max_trades_per_minute: 10
    
    pairs:
      - pair: "BTC/USDT"
        min_profit: 0.003
        max_spread: 0.40
        min_volume: 50
      - pair: "ETH/USDT"
        min_profit: 0.005
        max_spread: 0.45
        min_volume: 50
      - pair: "SOL/USDT"
        min_profit: 0.007
        max_spread: 0.50
        min_volume: 50
      - pair: "ADA/USDT"
        min_profit: 0.010
        max_spread: 0.55
        min_volume: 50
      - pair: "DOT/USDT"
        min_profit: 0.010
        max_spread: 0.55
        min_volume: 50
      - pair: "AVAX/USDT"
        min_profit: 0.010
        max_spread: 0.55
        min_volume: 50
      - pair: "MATIC/USDT"
        min_profit: 0.012
        max_spread: 0.60
        min_volume: 50
      - pair: "LINK/USDT"
        min_profit: 0.012
        max_spread: 0.60
        min_volume: 50
      - pair: "UNI/USDT"
        min_profit: 0.012
        max_spread: 0.60
        min_volume: 50
      - pair: "ATOM/USDT"
        min_profit: 0.015
        max_spread: 0.65
        min_volume: 50

  # --- Triangular Arbitrage ---
  triangular:
    enabled: true
    name: "Triangular Arbitrage (Dev)"
    description: "Exploite les inefficacités entre 3 paires de trading - Mode développement"
    min_profit_threshold: 0.005  # 0.5% - Plus bas en dev
    max_position_size: 500  # USD - Limité en dev
    execution_timeout: 15
    max_execution_attempts: 3
    min_time_between_trades: 5
    
    cycles:
      - name: "BTC-ETH-USDT"
        pairs:
          - "BTC/USDT"
          - "ETH/BTC"
          - "ETH/USDT"
        min_profit: 0.005
      - name: "SOL-BTC-USDT"
        pairs:
          - "SOL/USDT"
          - "BTC/SOL"
          - "BTC/USDT"
        min_profit: 0.007
      - name: "ADA-BTC-USDT"
        pairs:
          - "ADA/USDT"
          - "BTC/ADA"
          - "BTC/USDT"
        min_profit: 0.010
      - name: "DOT-ETH-USDT"
        pairs:
          - "DOT/USDT"
          - "ETH/DOT"
          - "ETH/USDT"
        min_profit: 0.010

  # --- Statistical Arbitrage ---
  statistical:
    enabled: true
    name: "Statistical Arbitrage (Dev)"
    description: "Utilise des modèles statistiques pour identifier les opportunités - Mode développement"
    min_profit_threshold: 0.005
    lookback_period: 30  # candles - Plus court en dev
    cointegration_confidence: 0.85  # Plus bas en dev
    z_score_threshold: 1.8  # Plus bas en dev
    half_life: 15  # periods - Plus court en dev
    max_position_size: 500  # USD - Limité en dev
    min_time_between_trades: 10
    
    pairs:
      - pair1: "BTC/USDT"
        pair2: "ETH/USDT"
        hedge_ratio: 0.5
        min_profit: 0.005
      - pair1: "SOL/USDT"
        pair2: "ADA/USDT"
        hedge_ratio: 0.8
        min_profit: 0.007
      - pair1: "DOT/USDT"
        pair2: "AVAX/USDT"
        hedge_ratio: 0.7
        min_profit: 0.007
      - pair1: "MATIC/USDT"
        pair2: "LINK/USDT"
        hedge_ratio: 0.6
        min_profit: 0.010

  # --- Flash Loan Arbitrage ---
  flash_loan:
    enabled: false
    name: "Flash Loan Arbitrage (Dev)"
    description: "Utilise des flash loans pour les opportunités d'arbitrage - Mode développement"
    min_profit_threshold: 0.02
    max_loan_size: 10000  # USD - Limité en dev
    gas_limit: 500000  # gas units
    max_gas_price: 50  # Gwei - Plus bas en dev
    platforms:
      - "aave"
      - "dydx"
    pairs:
      - "WETH/USDT"
      - "WBTC/USDT"

  # --- Cross-Chain Arbitrage ---
  cross_chain:
    enabled: false
    name: "Cross-Chain Arbitrage (Dev)"
    description: "Exploite les différences de prix entre les blockchains - Mode développement"
    min_profit_threshold: 0.015
    max_position_size: 5000  # USD - Limité en dev
    bridge_timeout: 60  # seconds
    bridges:
      - "anycall"
      - "wormhole"
    pairs:
      - "ETH-USDC"
      - "USDC-USDT"

# ============================================================
# RISK MANAGEMENT - DEVELOPMENT
# ============================================================
risk_management:
  enabled: true
  max_drawdown: 0.30  # 30% - Plus permissif en dev
  daily_loss_limit: 0.15  # 15% - Plus permissif en dev
  weekly_loss_limit: 0.25  # 25%
  max_positions: 5  # Moins de positions en dev
  max_positions_per_pair: 2
  max_positions_per_exchange: 3
  
  position_sizing:
    strategy: "adaptive"  # fixed | kelly | volatility | adaptive
    fixed_size: 100  # USD - Petit en dev
    max_position_size: 1000  # USD - Limité en dev
    min_position_size: 10  # USD - Plus petit en dev
    kelly_fraction: 0.25
    volatility_factor: 0.5
    adaptive_factor: 0.3
    
  stop_loss:
    enabled: true
    type: "trailing"  # fixed | trailing | dynamic
    percentage: 0.05  # 5% - Plus large en dev
    trailing_offset: 0.02  # 2%
    min_trailing: 0.01  # 1%
    max_trailing: 0.10  # 10%
    dynamic_factor: 0.5
    
  take_profit:
    enabled: true
    type: "multiple"  # single | multiple | trailing
    targets:
      - 0.02  # 2%
      - 0.03  # 3%
      - 0.04  # 4%
    allocation:
      - 0.5  # 50%
      - 0.3  # 30%
      - 0.2  # 20%
    trailing_activation: 0.015  # 1.5%
    
  circuit_breaker:
    enabled: true
    consecutive_failures: 3  # Plus bas en dev
    failure_window: 30  # seconds
    cooldown_period: 30  # seconds - Plus court en dev
    max_failures_per_hour: 10
    max_failures_per_day: 50
    
  drawdown_protection:
    enabled: true
    max_drawdown_daily: 0.10  # 10% - Plus permissif en dev
    max_drawdown_weekly: 0.20  # 20%
    max_drawdown_monthly: 0.30  # 30%
    action: "alert"  # stop | reduce | alert
    reduce_factor: 0.5
    recovery_threshold: 0.05  # 5%

# ============================================================
# EXECUTION ENGINE - DEVELOPMENT
# ============================================================
execution:
  enabled: true
  mode: "smart"  # simple | smart | adaptive
  order_types:
    - "market"
    - "limit"
    - "stop_loss"
    - "take_profit"
    - "trailing_stop"
    - "oco"
    
  order_routing:
    enabled: true
    strategy: "smart"  # smart | best_price | fastest
    max_slippage: 0.01  # 1% - Plus large en dev
    min_liquidity: 1000
    max_route_depth: 3
    
  batch_execution:
    enabled: true
    max_batch_size: 5  # Plus petit en dev
    batch_timeout: 3  # seconds
    batch_delay: 1  # seconds
    
  timeout:
    order: 15  # seconds
    execution: 30  # seconds
    settlement: 60  # seconds
    broadcast: 10  # seconds
    
  retry:
    enabled: true
    max_attempts: 3  # Moins de tentatives en dev
    delay: 1  # seconds
    backoff: 1.5  # multiplier
    max_delay: 10  # seconds
    
  validation:
    enabled: true
    check_balance: true
    check_limits: true
    check_risk: true
    check_market: true

# ============================================================
# MARKET DATA - DEVELOPMENT
# ============================================================
market_data:
  enabled: true
  source: "aggregated"  # aggregated | single | websocket
  providers:
    - "binance"
    - "bybit"
    - "coinbase"
    
  tickers:
    update_interval: 1  # seconds - Plus rapide en dev
    batch_size: 50
    cache_ttl: 5  # seconds
    
  order_book:
    update_interval: 5  # seconds
    depth: 50  # Plus petit en dev
    cache_ttl: 10  # seconds
    
  candles:
    enabled: true
    intervals:
      - "1m"
      - "5m"
      - "15m"
      - "1h"
      - "4h"
    retention: 100  # candles - Moins en dev
    cache_ttl: 60  # seconds
    
  websocket:
    enabled: true
    reconnect_attempts: 5
    reconnect_delay: 3  # seconds
    heartbeat_interval: 15  # seconds - Plus fréquent en dev
    ping_timeout: 5  # seconds
    max_retries: 10
    
  quality:
    min_volume: 100
    min_trades: 10
    max_age: 60  # seconds
    require_websocket: false

# ============================================================
# PERFORMANCE METRICS - DEVELOPMENT
# ============================================================
metrics:
  enabled: true
  collection_interval: 10  # seconds - Plus fréquent en dev
  retention: 3600  # seconds (1 hour)
  aggregation_interval: 60  # seconds
  
  metrics:
    - "pnl"
    - "trades"
    - "volume"
    - "win_rate"
    - "sharpe_ratio"
    - "max_drawdown"
    - "profit_factor"
    - "avg_profit"
    - "avg_loss"
    - "avg_trade_duration"
    - "execution_latency"
    - "order_fill_rate"
    - "slippage"
    - "fee_cost"
    - "opportunity_rate"
    - "success_rate"
    
  reporting:
    enabled: true
    interval: 300  # seconds (5 minutes)
    format: "json"  # json | csv | html
    output: "console"  # console | file | api
    
  alerts:
    enabled: true
    channels:
      - "console"
      - "telegram"
      - "email"
    min_interval: 60  # seconds

# ============================================================
# LOGGING CONFIGURATION - DEVELOPMENT
# ============================================================
logging:
  enabled: true
  level: "debug"
  format: "text"  # json | text
  colorize: true
  
  outputs:
    - type: "console"
      enabled: true
      colorize: true
      format: "text"
      
    - type: "file"
      enabled: true
      path: "/var/log/nexus/arbitrage-dev.log"
      max_size: 10485760  # 10MB
      max_files: 10
      format: "json"
      compress: false
      
    - type: "elasticsearch"
      enabled: false
      host: "${ELASTICSEARCH_HOST}"
      port: 9200
      index: "nexus-arbitrage-dev"
      ssl: false
      
    - type: "loki"
      enabled: false
      host: "${LOKI_HOST}"
      port: 3100
      labels:
        service: "arbitrage-bot"
        environment: "development"
        
  fields:
    service: "arbitrage-bot"
    environment: "development"
    version: "2.0.0-dev"
    instance: "local"
    
  filters:
    - "trace_id"
    - "span_id"
    - "user_id"
    - "session_id"

# ============================================================
# DATABASE CONFIGURATION - DEVELOPMENT
# ============================================================
database:
  enabled: true
  type: "postgres"  # timescaledb | postgres | mongodb
  host: "localhost"
  port: 5432
  name: "nexus_arbitrage_dev"
  user: "${DB_DEV_USER:-postgres}"
  password: "${DB_DEV_PASSWORD:-postgres}"
  
  pool_size: 10
  max_overflow: 20
  timeout: 15  # seconds
  pool_recycle: 3600  # seconds
  
  ssl:
    enabled: false
    mode: "disable"  # disable | require | verify-full
    ca: ""
    cert: ""
    key: ""
    
  backups:
    enabled: true
    interval: 43200  # seconds (12 hours)
    retention: 3  # days
    path: "/var/backups/nexus"
    compress: true
    
  migrations:
    enabled: true
    auto_run: true
    path: "./migrations/dev"
    table: "schema_migrations"
    
  queries:
    timeout: 30  # seconds
    max_rows: 10000
    
  timescaledb:
    enabled: true
    chunk_interval: "1 day"
    compression: true
    retention: "30 days"

# ============================================================
# CACHE CONFIGURATION - DEVELOPMENT
# ============================================================
cache:
  enabled: true
  type: "redis"  # redis | memory
  host: "localhost"
  port: 6379
  password: ""
  db: 0
  
  pool:
    max_connections: 10
    min_connections: 2
    
  ttl:
    tickers: 30  # seconds
    order_books: 10  # seconds
    candles: 60  # seconds
    opportunities: 5  # seconds
    metrics: 60  # seconds
    config: 300  # seconds
    
  compression:
    enabled: true
    algorithm: "zstd"  # zstd | gzip | snappy
    level: 3
    
  invalidation:
    strategy: "time"  # time | lru | lfu
    max_size: 1000

# ============================================================
# NOTIFICATIONS - DEVELOPMENT
# ============================================================
notifications:
  enabled: true
  
  channels:
    console:
      enabled: true
      format: "text"
      colorize: true
      
    telegram:
      enabled: true
      bot_token: "${TELEGRAM_BOT_TOKEN_DEV}"
      chat_id: "${TELEGRAM_CHAT_ID_DEV}"
      parse_mode: "HTML"
      disable_notification: false
      
    slack:
      enabled: false
      webhook_url: "${SLACK_WEBHOOK_URL}"
      channel: "#arbitrage-dev"
      username: "Nexus Arbitrage Bot (Dev)"
      icon_emoji: ":robot_face:"
      
    email:
      enabled: true
      smtp_host: "${SMTP_HOST_DEV:-smtp.gmail.com}"
      smtp_port: 587
      username: "${SMTP_USERNAME_DEV}"
      password: "${SMTP_PASSWORD_DEV}"
      from: "arbitrage-dev@nexustradingia.com"
      to:
        - "dev@nexustradingia.com"
        - "team@nexustradingia.com"
      cc: []
      bcc: []
      
    webhook:
      enabled: false
      url: "${WEBHOOK_URL}"
      headers:
        Authorization: "Bearer ${WEBHOOK_TOKEN}"
        Content-Type: "application/json"
        
  events:
    - "opportunity"
    - "execution"
    - "alert"
    - "error"
    - "status_change"
    - "daily_report"
    - "weekly_report"
    - "performance_alert"
    
  templates:
    opportunity: |
      🎯 **New Arbitrage Opportunity**
      Pair: {{pair}}
      Spread: ${{spread}}
      Profit: ${{profit}}
      Exchanges: {{exchange_a}} → {{exchange_b}}
      
    execution: |
      ✅ **Trade Executed**
      ID: {{trade_id}}
      Pair: {{pair}}
      Side: {{side}}
      Size: {{size}}
      Price: ${{price}}
      PnL: ${{pnl}}
      
    alert: |
      ⚠️ **Alert: {{alert_type}}**
      {{message}}
      Severity: {{severity}}
      
    error: |
      ❌ **Error**
      {{error_message}}
      Stack: {{stack_trace}}
      
    daily_report: |
      📊 **Daily Report**
      Date: {{date}}
      Trades: {{total_trades}}
      Win Rate: {{win_rate}}%
      Total PnL: ${{total_pnl}}
      Best Trade: ${{best_trade}}
      Worst Trade: ${{worst_trade}}

# ============================================================
# API CONFIGURATION - DEVELOPMENT
# ============================================================
api:
  enabled: true
  host: "0.0.0.0"  # Accessible depuis l'hôte
  port: 8000
  prefix: "/api/v1"
  workers: 1
  reload: true
  
  cors:
    enabled: true
    origins:
      - "http://localhost:3000"
      - "http://127.0.0.1:3000"
      - "http://localhost:3001"
      - "http://localhost:5173"
      - "http://127.0.0.1:5173"
    methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
      - "PATCH"
    headers:
      - "Authorization"
      - "Content-Type"
      - "X-Request-ID"
      - "X-API-Key"
    credentials: true
    max_age: 86400
    
  rate_limit:
    enabled: false  # Pas de rate limit en dev
    requests_per_minute: 0
    burst: 0
    store: "memory"
    
  authentication:
    enabled: false  # Pas d'auth en dev
    type: "jwt"  # jwt | api_key
    jwt_secret: "dev-jwt-secret-1234567890"
    token_expiry: 86400  # seconds (24 hours)
    refresh_token_expiry: 2592000  # seconds (30 days)
    api_key_header: "X-API-Key"
    
  documentation:
    enabled: true
    path: "/docs"
    title: "NEXUS Arbitrage Bot API (Dev)"
    version: "2.0.0-dev"
    description: "API pour le bot d'arbitrage - Environnement de développement"
    
  debug_endpoints:
    enabled: true
    path: "/debug"
    features:
      - "status"
      - "metrics"
      - "config"
      - "cache"
      - "queue"

# ============================================================
# WEBSOCKET CONFIGURATION - DEVELOPMENT
# ============================================================
websocket:
  enabled: true
  host: "0.0.0.0"  # Accessible depuis l'hôte
  port: 8001
  path: "/ws"
  
  max_connections: 100
  max_message_size: 1048576  # 1MB
  ping_interval: 15  # seconds - Plus fréquent en dev
  ping_timeout: 5  # seconds
  max_pong_latency: 10  # seconds
  
  authentication:
    enabled: false  # Pas d'auth en dev
    type: "jwt"
    header: "Authorization"
    
  channels:
    - "opportunities"
    - "executions"
    - "metrics"
    - "alerts"
    - "status"
    - "logs"
    - "debug"
    - "performance"
    - "risk"
    
  compression:
    enabled: true
    algorithm: "permessage-deflate"
    level: 3

# ============================================================
# MONITORING - DEVELOPMENT
# ============================================================
monitoring:
  enabled: true
  
  prometheus:
    enabled: true
    port: 9090
    path: "/metrics"
    namespace: "nexus"
    subsystem: "arbitrage"
    labels:
      environment: "development"
      version: "2.0.0-dev"
      
  grafana:
    enabled: false
    host: "localhost"
    port: 3000
    dashboard_id: "nexus-arbitrage-dev"
    datasource: "prometheus"
    
  health_check:
    enabled: true
    interval: 15  # seconds
    path: "/health"
    timeout: 5  # seconds
    checks:
      - "database"
      - "cache"
      - "exchanges"
      - "websocket"
      - "api"
      
  alerts:
    enabled: true
    rules:
      - name: "high_latency"
        condition: "execution_latency > 500ms"
        severity: "warning"
        duration: "1m"
        action: "notify"
        
      - name: "high_error_rate"
        condition: "error_rate > 0.10"
        severity: "warning"
        duration: "30s"
        action: "notify"
        
      - name: "low_profit"
        condition: "profit_factor < 1.2"
        severity: "info"
        duration: "5m"
        action: "notify"
        
      - name: "high_drawdown"
        condition: "drawdown > 0.15"
        severity: "warning"
        duration: "1m"
        action: "notify"
        
      - name: "connection_lost"
        condition: "is_connected == false"
        severity: "critical"
        duration: "10s"
        action: "notify,reconnect"
        
      - name: "opportunity_rate"
        condition: "opportunity_rate < 0.1"
        severity: "info"
        duration: "5m"
        action: "notify"
        
    cooldown: 60  # seconds

# ============================================================
# SCHEDULER CONFIGURATION - DEVELOPMENT
# ============================================================
scheduler:
  enabled: true
  timezone: "UTC"
  max_workers: 3
  thread_pool: 5
  
  jobs:
    - name: "opportunity_scanner"
      enabled: true
      interval: 2  # seconds - Plus rapide en dev
      timeout: 15
      max_retries: 2
      description: "Scanne les opportunités d'arbitrage"
      
    - name: "performance_reporter"
      enabled: true
      schedule: "0 */4 * * *"  # every 4 hours
      timeout: 60
      max_retries: 2
      description: "Génère les rapports de performance"
      
    - name: "daily_cleanup"
      enabled: true
      schedule: "0 0 * * *"  # daily at midnight
      timeout: 60
      max_retries: 3
      description: "Nettoie les données obsolètes"
      
    - name: "health_check"
      enabled: true
      interval: 30  # seconds
      timeout: 15
      max_retries: 3
      description: "Vérifie la santé du système"
      
    - name: "market_data_sync"
      enabled: true
      interval: 60  # seconds
      timeout: 30
      max_retries: 3
      description: "Synchronise les données de marché"
      
    - name: "backup_rotation"
      enabled: true
      schedule: "0 */12 * * *"  # every 12 hours
      timeout: 300
      max_retries: 2
      description: "Rotation des backups"

# ============================================================
# BACKTESTING CONFIGURATION - DEVELOPMENT
# ============================================================
backtesting:
  enabled: true
  mode: "quick"  # quick | full | monte_carlo
  parallel: false
  workers: 1
  
  data:
    source: "historical"  # historical | live
    start_date: "2024-01-01"
    end_date: "2024-03-31"  # Période plus courte en dev
    instruments:
      - "BTC/USDT"
      - "ETH/USDT"
      - "SOL/USDT"
      - "ADA/USDT"
      - "DOT/USDT"
    quality: "1m"
    source_path: "./data/historical"
    
  simulation:
    initial_balance: 10000
    commission: 0.001
    slippage: 0.002
    latency: 100  # milliseconds
    fill_model: "market"  # market | limit | partial
    min_trade_size: 10
    
  optimization:
    enabled: true
    iterations: 50  # Plus bas en dev
    strategy: "random"  # random | grid | bayesian
    parameters:
      - name: "min_profit"
        range: [0.001, 0.02]
        step: 0.001
      - name: "max_spread"
        range: [0.10, 0.50]
        step: 0.05
      - name: "position_size"
        range: [100, 1000]
        step: 100
        
  reporting:
    metrics:
      - "total_return"
      - "sharpe_ratio"
      - "max_drawdown"
      - "win_rate"
      - "profit_factor"
      - "avg_trade"
      - "calmar_ratio"
      - "sortino_ratio"
      - "omega_ratio"
    visualizations:
      - "equity_curve"
      - "drawdown_chart"
      - "trade_distribution"
      - "monthly_returns"
      - "rolling_sharpe"
    format: "html"  # html | pdf | json
    path: "./reports/backtest"

# ============================================================
# SECURITY CONFIGURATION - DEVELOPMENT
# ============================================================
security:
  enabled: false  # Sécurité désactivée en dev
  
  encryption:
    enabled: false
    algorithm: "AES-256-GCM"
    key: "${ENCRYPTION_KEY_DEV}"
    salt: "${ENCRYPTION_SALT_DEV}"
    
  api_keys:
    encryption: false
    rotation: 30  # days - Plus fréquent en dev
    min_length: 32
    max_length: 64
    
  ip_whitelist:
    enabled: false
    ips:
      - "127.0.0.1/32"
      - "192.168.0.0/16"
      - "10.0.0.0/8"
      
  user_agent:
    enabled: false
    required: false
    whitelist: []
    
  rate_limiting:
    enabled: false
    requests_per_minute: 0
    burst_limit: 0
    storage: "memory"
    
  ssl:
    enabled: false
    cert: "./certs/dev-cert.pem"
    key: "./certs/dev-key.pem"
    ca: "./certs/ca.pem"
    
  audit:
    enabled: true
    log_level: "debug"
    retention: 30  # days - Plus court en dev
    path: "/var/log/nexus/audit-dev.log"

# ============================================================
# COMPLIANCE CONFIGURATION - DEVELOPMENT
# ============================================================
compliance:
  enabled: false  # Compliance désactivée en dev
  
  regulations:
    - "MIFID_II"
    - "KYC"
    - "AML"
    
  reporting:
    enabled: false
    interval: "daily"
    format: "pdf"
    path: "./reports/compliance"
    
  audit:
    enabled: false
    log_level: "debug"
    retention: 30  # days - Plus court en dev
    path: "/var/log/nexus/compliance-dev.log"
    
  limits:
    max_trade_size: 10000
    max_daily_trades: 50
    max_position_size: 20000
    max_daily_volume: 100000
