# DEVELOPMENT FEATURES
# ============================================================
development:
  enabled: true
  
  # Data Simulation
  mock_data: true  # Données simulées pour le développement
  simulate_latency: true  # Latence simulée
  simulate_errors: true  # Erreurs simulées
  simulate_market_conditions: true  # Conditions de marché simulées
  error_rate: 0.05  # 5% d'erreurs simulées
  latency_min: 10  # milliseconds
  latency_max: 100  # milliseconds
  
  # Code Features
  hot_reload: true  # Rechargement à chaud
  debug_endpoints: true  # Points d'accès debug
  verbose_logging: true  # Logging détaillé
  trace_logging: true  # Logging de trace
  profile_code: true  # Profilage du code
  
  # Testing Features
  test_mode: true
  fake_orders: true
  fake_balances: true
  fake_market_data: true
  
  # Performance
  profiling:
