# ============================================================
# BOT IDENTITY - DEVELOPMENT
# ============================================================
bot:
  id: "arbitrage-bot-dev-001"
  name: "NEXUS Arbitrage Bot (Dev)"
  version: "2.0.0-dev"
  description: "Bot d'arbitrage algorithmique - Environnement de développement"
  environment: "development"
  
# ============================================================
# GENERAL SETTINGS - DEVELOPMENT
# ============================================================
general:
  enabled: true
  debug: true
  log_level: "debug"  # debug | info | warning | error
  timezone: "UTC"
  locale: "en_US"
  max_concurrent_operations: 3
  operation_timeout: 10  # seconds
  retry_attempts: 2
  retry_delay: 2  # seconds
  shutdown_timeout: 5  # seconds
  
# ============================================================
