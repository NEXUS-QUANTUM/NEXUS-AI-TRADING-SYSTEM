# ============================================================
# ARBITRAGE STRATEGIES - DEFAULT
# ============================================================
strategies:
  # --- Cross-Exchange Arbitrage ---
  cross_exchange:
    enabled: false
    name: "Cross-Exchange Arbitrage"
    description: "Exploite les différences de prix entre les exchanges"
    min_profit_threshold: 0.01  # 1%
    max_spread_percentage: 0.20  # 20%
    min_volume_threshold: 500  # USD
    max_position_size: 1000  # USD
    execution_timeout: 15  # seconds
    max_execution_attempts: 2
    min_time_between_trades: 10  # seconds
    max_trades_per_minute: 5
    pairs: []

  # --- Triangular Arbitrage ---
  triangular:
    enabled: false
    name: "Triangular Arbitrage"
    description: "Exploite les inefficacités entre 3 paires de trading"
    min_profit_threshold: 0.01  # 1%
    max_position_size: 1000  # USD
    execution_timeout: 15
    max_execution_attempts: 2
    min_time_between_trades: 10
    cycles: []

  # --- Statistical Arbitrage ---
  statistical:
    enabled: false
    name: "Statistical Arbitrage"
    description: "Utilise des modèles statistiques pour identifier les opportunités"
    min_profit_threshold: 0.01
    lookback_period: 50  # candles
    cointegration_confidence: 0.90
    z_score_threshold: 2.0
    half_life: 20  # periods
    max_position_size: 1000
    min_time_between_trades: 15
    pairs: []

  # --- Flash Loan Arbitrage ---
  flash_loan:
    enabled: false
    name: "Flash Loan Arbitrage"
    description: "Utilise des flash loans pour les opportunités d'arbitrage"
    min_profit_threshold: 0.02
    max_loan_size: 10000  # USD
    gas_limit: 500000  # gas units
    max_gas_price: 100  # Gwei
    platforms: []
    pairs: []

  # --- Cross-Chain Arbitrage ---
  cross_chain:
    enabled: false
    name: "Cross-Chain Arbitrage"
    description: "Exploite les différences de prix entre les blockchains"
    min_profit_threshold: 0.015
    max_position_size: 5000
    bridge_timeout: 60  # seconds
    bridges: []
    pairs: []

# ============================================================
# RISK MANAGEMENT - DEFAULT
# ============================================================
risk_management:
  enabled: true
  max_drawdown: 0.20  # 20%
  daily_loss_limit: 0.10  # 10%
  weekly_loss_limit: 0.15  # 15%
  max_positions: 3
  max_positions_per_pair: 1
  max_positions_per_exchange: 2
  
  position_sizing:
    strategy: "fixed"  # fixed | kelly | volatility | adaptive
    fixed_size: 100  # USD
    max_position_size: 1000  # USD
    min_position_size: 10  # USD
    kelly_fraction: 0.25
    volatility_factor: 0.5
    adaptive_factor: 0.3
    
  stop_loss:
    enabled: true
    type: "fixed"  # fixed | trailing | dynamic
    percentage: 0.03  # 3%
    trailing_offset: 0.015  # 1.5%
    min_trailing: 0.01  # 1%
    max_trailing: 0.08  # 8%
    dynamic_factor: 0.5
    
  take_profit:
    enabled: true
    type: "single"  # single | multiple | trailing
    targets:
      - 0.02  # 2%
    allocation:
      - 1.0  # 100%
    trailing_activation: 0.015  # 1.5%
    
  circuit_breaker:
    enabled: true
    consecutive_failures: 3
    failure_window: 30  # seconds
    cooldown_period: 60  # seconds
    max_failures_per_hour: 10
    max_failures_per_day: 50
    
  drawdown_protection:
    enabled: true
    max_drawdown_daily: 0.07  # 7%
    max_drawdown_weekly: 0.15  # 15%
    max_drawdown_monthly: 0.25  # 25%
    action: "alert"  # stop | reduce | alert
    reduce_factor: 0.5
    recovery_threshold: 0.05  # 5%

# ============================================================
# EXECUTION ENGINE - DEFAULT
# ============================================================
execution:
  enabled: true
  mode: "simple"  # simple | smart | adaptive
  order_types:
    - "market"
    - "limit"
    
  order_routing:
    enabled: false
    strategy: "best_price"  # smart | best_price | fastest
    max_slippage: 0.005  # 0.5%
    min_liquidity: 1000
    max_route_depth: 2
    
  batch_execution:
    enabled: false
    max_batch_size: 3
    batch_timeout: 3  # seconds
    batch_delay: 1  # seconds
    
  timeout:
    order: 15  # seconds
    execution: 30  # seconds
    settlement: 60  # seconds
    broadcast: 10  # seconds
    
  retry:
    enabled: true
    max_attempts: 2
    delay: 1  # seconds
    backoff: 1.5  # multiplier
    max_delay: 10  # seconds
    
  validation:
    enabled: true
    check_balance: true
    check_limits: true
    check_risk: true
    check_market: true

# ============================================================
# MARKET DATA - DEFAULT
# ============================================================
market_data:
  enabled: true
  source: "single"  # aggregated | single | websocket
  providers: []
  
  tickers:
    update_interval: 2  # seconds
    batch_size: 20
    cache_ttl: 5  # seconds
    
  order_book:
    update_interval: 10  # seconds
    depth: 20
    cache_ttl: 10  # seconds
    
  candles:
    enabled: false
    intervals:
      - "1m"
      - "5m"
      - "15m"
      - "1h"
    retention: 50  # candles
    cache_ttl: 60  # seconds
    
  websocket:
    enabled: false
    reconnect_attempts: 5
    reconnect_delay: 3  # seconds
    heartbeat_interval: 30  # seconds
    ping_timeout: 10  # seconds
    max_retries: 5
    
  quality:
    min_volume: 100
    min_trades: 10
    max_age: 60  # seconds
    require_websocket: false

# ============================================================
# PERFORMANCE METRICS - DEFAULT
# ============================================================
metrics:
  enabled: true
  collection_interval: 30  # seconds
  retention: 3600  # seconds (1 hour)
  aggregation_interval: 60  # seconds
  
  metrics:
    - "pnl"
    - "trades"
    - "volume"
    - "win_rate"
    - "sharpe_ratio"
    - "max_drawdown"
    - "profit_factor"
    
  reporting:
    enabled: false
    interval: 3600  # seconds (1 hour)
    format: "json"  # json | csv | html
    output: "console"  # console | file | api
    
  alerts:
    enabled: false
    channels: []
    min_interval: 60  # seconds

# ============================================================
# LOGGING CONFIGURATION - DEFAULT
# ============================================================
logging:
  enabled: true
  level: "debug"
  format: "text"  # json | text
  colorize: true
  
  outputs:
    - type: "console"
      enabled: true
      colorize: true
      format: "text"
      
    - type: "file"
      enabled: false
      path: "/tmp/nexus-arbitrage.log"
      max_size: 1048576  # 1MB
      max_files: 3
      format: "json"
      compress: false
      
  fields:
    service: "arbitrage-bot"
    environment: "development"
    version: "2.0.0"
    
  filters: []

# ============================================================
# DATABASE CONFIGURATION - DEFAULT
# ============================================================
database:
  enabled: false
  type: "postgres"  # timescaledb | postgres | mongodb
  host: "localhost"
  port: 5432
  name: "nexus_arbitrage"
  user: "postgres"
  password: ""
  
  pool_size: 5
  max_overflow: 10
  timeout: 15  # seconds
  pool_recycle: 3600  # seconds
  
  ssl:
    enabled: false
    mode: "disable"  # disable | require | verify-full
    ca: ""
    cert: ""
    key: ""
    
  backups:
    enabled: false
    interval: 86400  # seconds (24 hours)
    retention: 3  # days
    path: "/var/backups/nexus"
    compress: true
    
  migrations:
    enabled: false
    auto_run: false
    path: "./migrations"
    table: "schema_migrations"
    
  queries:
    timeout: 30  # seconds
    max_rows: 10000
    
  timescaledb:
    enabled: false
    chunk_interval: "1 day"
    compression: false
    retention: "30 days"

# ============================================================
# CACHE CONFIGURATION - DEFAULT
# ============================================================
cache:
  enabled: false
  type: "memory"  # redis | memory
  host: "localhost"
  port: 6379
  password: ""
  db: 0
  
  pool:
    max_connections: 5
    min_connections: 1
    
  ttl:
    tickers: 30  # seconds
    order_books: 10  # seconds
    candles: 60  # seconds
    opportunities: 5  # seconds
    metrics: 60  # seconds
    config: 300  # seconds
    
  compression:
    enabled: false
    algorithm: "gzip"  # zstd | gzip | snappy
    level: 3
    
  invalidation:
    strategy: "time"  # time | lru | lfu
    max_size: 100

# ============================================================
# NOTIFICATIONS - DEFAULT
# ============================================================
notifications:
  enabled: false
  
  channels:
