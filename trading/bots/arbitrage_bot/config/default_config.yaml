  events:
    - "opportunity"
    - "execution"
    - "alert"
    - "error"
    - "status_change"
    
  templates: {}

# ============================================================
# API CONFIGURATION - DEFAULT
# ============================================================
api:
  enabled: false
  host: "127.0.0.1"
  port: 8000
  prefix: "/api/v1"
  workers: 1
  reload: false
  
  cors:
    enabled: false
    origins:
      - "*"
    methods:
      - "GET"
      - "POST"
    headers:
      - "Authorization"
      - "Content-Type"
    credentials: false
    max_age: 86400
    
  rate_limit:
    enabled: false
    requests_per_minute: 60
    burst: 10
    store: "memory"
    
  authentication:
    enabled: false
    type: "jwt"  # jwt | api_key
    jwt_secret: ""
    token_expiry: 3600  # seconds
    refresh_token_expiry: 86400  # seconds (24 hours)
    api_key_header: "X-API-Key"
    
  documentation:
    enabled: false
    path: "/docs"
    title: "NEXUS Arbitrage Bot API"
    version: "2.0.0"
    description: "API pour le bot d'arbitrage"
    
  debug_endpoints:
    enabled: false
    path: "/debug"
    features: []

# ============================================================
# WEBSOCKET CONFIGURATION - DEFAULT
# ============================================================
websocket:
  enabled: false
  host: "127.0.0.1"
  port: 8001
  path: "/ws"
  
  max_connections: 100
  max_message_size: 1048576  # 1MB
  ping_interval: 30  # seconds
  ping_timeout: 10  # seconds
  max_pong_latency: 20  # seconds
  
  authentication:
    enabled: false
    type: "jwt"
    header: "Authorization"
    
  channels:
    - "opportunities"
    - "executions"
    - "metrics"
    - "alerts"
    - "status"
    
  compression:
    enabled: false
    algorithm: "permessage-deflate"
    level: 3

# ============================================================
# MONITORING - DEFAULT
# ============================================================
monitoring:
  enabled: false
  
  prometheus:
    enabled: false
    port: 9090
    path: "/metrics"
    namespace: "nexus"
    subsystem: "arbitrage"
    labels:
      environment: "development"
      
  grafana:
    enabled: false
    host: "localhost"
    port: 3000
    dashboard_id: "nexus-arbitrage"
    datasource: "prometheus"
    
  health_check:
    enabled: false
    interval: 30  # seconds
    path: "/health"
    timeout: 5  # seconds
    checks: []
    
  alerts:
    enabled: false
    rules: []
    cooldown: 60  # seconds

# ============================================================
# SCHEDULER CONFIGURATION - DEFAULT
# ============================================================
scheduler:
  enabled: false
  timezone: "UTC"
  max_workers: 2
  thread_pool: 3
  
  jobs:
    - name: "opportunity_scanner"
      enabled: false
      interval: 2  # seconds
      timeout: 15
      max_retries: 2
      description: "Scanne les opportunités d'arbitrage"
      
    - name: "performance_reporter"
      enabled: false
      schedule: "0 */12 * * *"  # every 12 hours
      timeout: 60
      max_retries: 2
      description: "Génère les rapports de performance"
      
    - name: "daily_cleanup"
      enabled: false
      schedule: "0 0 * * *"  # daily at midnight
      timeout: 60
      max_retries: 3
      description: "Nettoie les données obsolètes"

# ============================================================
# BACKTESTING CONFIGURATION - DEFAULT
# ============================================================
backtesting:
  enabled: false
  mode: "quick"  # quick | full | monte_carlo
  parallel: false
  workers: 1
  
  data:
    source: "historical"  # historical | live
    start_date: "2024-01-01"
    end_date: "2024-06-30"
    instruments: []
    quality: "1m"
    source_path: "./data/historical"
    
  simulation:
    initial_balance: 10000
    commission: 0.001
    slippage: 0.002
    latency: 100  # milliseconds
    fill_model: "market"  # market | limit | partial
    min_trade_size: 10
    
  optimization:
    enabled: false
    iterations: 100
    strategy: "random"  # random | grid | bayesian
    parameters: []
    
  reporting:
    metrics:
      - "total_return"
      - "sharpe_ratio"
      - "max_drawdown"
      - "win_rate"
      - "profit_factor"
    visualizations:
      - "equity_curve"
      - "drawdown_chart"
    format: "html"  # html | pdf | json
    path: "./reports/backtest"

# ============================================================
# SECURITY CONFIGURATION - DEFAULT
# ============================================================
security:
  enabled: false
  
  encryption:
    enabled: false
    algorithm: "AES-256-GCM"
    key: ""
    salt: ""
    
  api_keys:
    encryption: false
    rotation: 90  # days
    min_length: 32
    max_length: 64
    
  ip_whitelist:
    enabled: false
    ips: []
    
  user_agent:
    enabled: false
    required: false
    whitelist: []
    
  rate_limiting:
    enabled: false
    requests_per_minute: 60
    burst_limit: 10
    storage: "memory"
    
  ssl:
    enabled: false
    cert: ""
    key: ""
    ca: ""
    
  audit:
    enabled: false
    log_level: "info"
    retention: 365  # days
    path: "/var/log/nexus/audit.log"

# ============================================================
# COMPLIANCE CONFIGURATION - DEFAULT
# ============================================================
compliance:
  enabled: false
  
  regulations: []
  
  reporting:
    enabled: false
    interval: "weekly"
    format: "pdf"
    path: "./reports/compliance"
    
  audit:
    enabled: false
    log_level: "info"
    retention: 365  # days (1 year)
    path: "/var/log/nexus/compliance.log"
    
  limits:
    max_trade_size: 10000
    max_daily_trades: 50
    max_position_size: 20000
    max_daily_volume: 100000
    max_leverage: 3

# ============================================================
# DEVELOPMENT FEATURES - DEFAULT
# ============================================================
development:
  enabled: true
  
  # Data Simulation
  mock_data: true  # Données simulées
  simulate_latency: true  # Latence simulée
  simulate_errors: true  # Erreurs simulées
  simulate_market_conditions: false
  error_rate: 0.05  # 5%
  latency_min: 10  # milliseconds
  latency_max: 100  # milliseconds
  
  # Code Features
  hot_reload: true
  debug_endpoints: false
  verbose_logging: true
  trace_logging: false
  profile_code: false
  
  # Testing Features
  test_mode: true
  fake_orders: true
  fake_balances: true
  fake_market_data: true
  
  # Performance
  profiling:
    enabled: false
    port: 6060
    endpoint: "/debug/pprof"
    
  # Testing
  testing:
    mode: "unit"  # unit | integration | e2e
    coverage: false
    coverage_threshold: 70
    report_path: "./reports/coverage"
    
  # Sandbox
  sandbox:
    enabled: true
    mode: "simulation"  # simulation | testnet | hybrid
    limits:
      max_balance: 10000
      max_trade_size: 1000
      max_positions: 3

# ============================================================
# END OF DEFAULT CONFIGURATION
# ============================================================
