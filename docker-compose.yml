# Docker Compose - Configuration Principale
# ============================================

version: '3.8'

# ============================================
# SERVICES
# ============================================
services:
  # ============================================
  # POSTGRESQL - Base de données principale
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: nexus_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER:-nexus}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-nexus123}
      POSTGRES_DB: ${DATABASE_NAME:-nexus_ai}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    networks:
      - nexus_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-nexus}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # TIMESCALEDB - Base de données time-series
  # ============================================
  timescaledb:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: nexus_timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER:-nexus}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-nexus123}
      POSTGRES_DB: nexus_ts
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - nexus_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-nexus}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # MONGODB - Base de données NoSQL
  # ============================================
  mongodb:
    image: mongo:7
    container_name: nexus_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DATABASE_USER:-nexus}
      MONGO_INITDB_ROOT_PASSWORD: ${DATABASE_PASSWORD:-nexus123}
      MONGO_INITDB_DATABASE: nexus_ai
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongodb/init.js:/docker-entrypoint-initdb.d/init.js
    ports:
      - "27017:27017"
    networks:
      - nexus_network
    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval 'db.runCommand({ping: 1})'"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # REDIS - Cache & Message Broker
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: nexus_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-nexus123}
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    networks:
      - nexus_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-nexus123}", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # REDIS INSIGHT - Interface Redis
  # ============================================
  redis-insight:
    image: redislabs/redisinsight:latest
    container_name: nexus_redis_insight
    restart: unless-stopped
    ports:
      - "5540:5540"
    volumes:
      - redis_insight_data:/db
    networks:
      - nexus_network
    depends_on:
      - redis
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # PGADMIN - Interface PostgreSQL
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nexus_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@nexusquantum.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      - nexus_network
    depends_on:
      - postgres
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # BACKEND - FastAPI
  # ============================================
  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/backend/Dockerfile
    container_name: nexus_backend
    restart: unless-stopped
    volumes:
      - ./backend:/app/backend
      - ./ai:/app/ai
      - ./trading:/app/trading
      - ./shared:/app/shared
      - ./configs:/app/configs
      - ./data:/app/data
      - ./backend/logs:/app/logs
      - ./backend/uploads:/app/uploads
    environment:
      - APP_ENV=${APP_ENV:-development}
      - APP_DEBUG=${APP_DEBUG:-true}
      - APP_SECRET_KEY=${APP_SECRET_KEY}
      - DATABASE_URL=postgresql://${DATABASE_USER:-nexus}:${DATABASE_PASSWORD:-nexus123}@postgres:5432/${DATABASE_NAME:-nexus_ai}
      - TIMESCALEDB_URL=postgresql://${DATABASE_USER:-nexus}:${DATABASE_PASSWORD:-nexus123}@timescaledb:5432/nexus_ts
      - MONGODB_URL=mongodb://${DATABASE_USER:-nexus}:${DATABASE_PASSWORD:-nexus123}@mongodb:27017
      - REDIS_URL=redis://:${REDIS_PASSWORD:-nexus123}@redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET}
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - ALPACA_API_SECRET=${ALPACA_API_SECRET}
      - STRIPE_API_KEY=${STRIPE_API_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SENTRY_DSN=${SENTRY_DSN}
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    networks:
      - nexus_network
    depends_on:
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # FRONTEND - Next.js
  # ============================================
  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/frontend/Dockerfile
    container_name: nexus_frontend
    restart: unless-stopped
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=${APP_ENV:-development}
      - NEXT_PUBLIC_APP_NAME=${APP_NAME:-NEXUS TRADING IA}
      - NEXT_PUBLIC_APP_URL=${APP_URL:-http://localhost:3000}
      - NEXT_PUBLIC_API_URL=${API_URL:-http://localhost:8000}/api/v1
      - NEXT_PUBLIC_WEBSOCKET_URL=${WS_URL:-ws://localhost:8000}/ws
      - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - NEXT_PUBLIC_GA_TRACKING_ID=${GA_TRACKING_ID}
      - NEXT_PUBLIC_SENTRY_DSN=${SENTRY_DSN}
      - NEXT_PUBLIC_ENABLE_CHAT=true
      - NEXT_PUBLIC_ENABLE_SOCIAL_AUTH=true
    ports:
      - "3000:3000"
    networks:
      - nexus_network
    depends_on:
      - backend
    command: npm run dev
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # NGINX - Reverse Proxy
  # ============================================
  nginx:
    build:
      context: .
      dockerfile: infrastructure/docker/nginx/Dockerfile
    container_name: nexus_nginx
    restart: unless-stopped
    volumes:
      - ./infrastructure/docker/nginx/conf.d:/etc/nginx/conf.d
      - ./infrastructure/docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./infrastructure/docker/nginx/sites-available:/etc/nginx/sites-available
      - ./infrastructure/docker/nginx/sites-enabled:/etc/nginx/sites-enabled
      - ./infrastructure/docker/nginx/ssl:/etc/nginx/ssl
      - ./infrastructure/docker/nginx/logs:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    networks:
      - nexus_network
    depends_on:
      - backend
      - frontend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # PROMETHEUS - Monitoring
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: nexus_prometheus
    restart: unless-stopped
    volumes:
      - ./configs/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./configs/monitoring/prometheus/alerts:/etc/prometheus/alerts
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - nexus_network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # GRAFANA - Dashboards
  # ============================================
  grafana:
    image: grafana/grafana:latest
    container_name: nexus_grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-clock-panel,grafana-simple-json-datasource
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_AUTH_BASIC_ENABLED=true
    volumes:
      - ./configs/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./configs/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    networks:
      - nexus_network
    depends_on:
      - prometheus
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # LOKI - Log Aggregation
  # ============================================
  loki:
    image: grafana/loki:latest
    container_name: nexus_loki
    restart: unless-stopped
    volumes:
      - ./configs/monitoring/loki/loki-config.yaml:/etc/loki/loki-config.yaml
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - nexus_network
    command: -config.file=/etc/loki/loki-config.yaml
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # PROMTAIL - Log Collector
  # ============================================
  promtail:
    image: grafana/promtail:latest
    container_name: nexus_promtail
    restart: unless-stopped
    volumes:
      - ./configs/monitoring/promtail/promtail-config.yaml:/etc/promtail/promtail-config.yaml
      - /var/log:/var/log
      - ./backend/logs:/app/logs
    ports:
      - "9080:9080"
    networks:
      - nexus_network
    command: -config.file=/etc/promtail/promtail-config.yaml
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # TEMPO - Distributed Tracing
  # ============================================
  tempo:
    image: grafana/tempo:latest
    container_name: nexus_tempo
    restart: unless-stopped
    volumes:
      - ./configs/monitoring/tempo/tempo-config.yaml:/etc/tempo/tempo-config.yaml
      - tempo_data:/tempo
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    networks:
      - nexus_network
    command: -config.file=/etc/tempo/tempo-config.yaml
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # ALERTMANAGER - Alerting
  # ============================================
  alertmanager:
    image: prom/alertmanager:latest
    container_name: nexus_alertmanager
    restart: unless-stopped
    volumes:
      - ./configs/monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    networks:
      - nexus_network
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ============================================
# VOLUMES
# ============================================
volumes:
  postgres_data:
    driver: local
  timescaledb_data:
    driver: local
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  redis_insight_data:
    driver: local
  pgadmin_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
  tempo_data:
    driver: local
  alertmanager_data:
    driver: local

# ============================================
# NETWORKS
# ============================================
networks:
  nexus_network:
    driver: bridge
    name: nexus_network
