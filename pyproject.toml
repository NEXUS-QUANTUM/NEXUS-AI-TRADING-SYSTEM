# ============================================
# PROJECT SCRIPTS
# ============================================
[project.scripts]
nexus = "nexus.cli:main"
nexus-api = "uvicorn backend.main:app --host 0.0.0.0 --port 8000"
nexus-dev = "uvicorn backend.main:app --reload --host 0.0.0.0 --port 8000"
nexus-test = "pytest"
nexus-test-cov = "pytest --cov=backend --cov-report=html"
nexus-lint = "ruff check . && black --check . && mypy ."
nexus-format = "black . && isort . && ruff check --fix ."
nexus-migrate = "alembic upgrade head"
nexus-migrate-make = "alembic revision --autogenerate"
nexus-seed = "python backend/database/seeders/main_seeder.py"
nexus-backtest = "python trading/backtesting/backtest_engine.py"
nexus-train = "python ai/training/trainer.py"
nexus-predict = "python ai/prediction/predictor.py"

# ============================================
# TOOL CONFIGURATIONS
# ============================================
[tool.black]
line-length = 88
target-version = ['py312']
include = '\.pyi?$'
exclude = '''
/(
    \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
  | venv
  | env
  | node_modules
  | \.next
)/
'''
extend-exclude = '''
/(
    alembic
  | migrations
  | tests
)/
'''

[tool.isort]
profile = "black"
line_length = 88
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
known_first_party = ["nexus", "backend", "ai", "trading", "shared"]
known_third_party = [
    "fastapi",
    "sqlalchemy",
    "alembic",
    "psycopg2",
    "asyncpg",
    "redis",
    "motor",
    "pymongo",
    "pydantic",
    "uvicorn",
    "celery",
    "pandas",
    "numpy",
    "polars",
    "scipy",
    "sklearn",
    "xgboost",
    "lightgbm",
    "catboost",
    "torch",
    "transformers",
    "langchain",
    "openai",
    "ccxt",
    "yfinance",
    "prometheus_client",
    "sentry_sdk",
]
skip_gitignore = true
sections = [
    "FUTURE",
    "STDLIB",
    "THIRDPARTY",
    "FIRSTPARTY",
    "LOCALFOLDER",
]

[tool.ruff]
line-length = 88
target-version = "py312"
exclude = [
    ".git",
    ".venv",
    "venv",
    "env",
    "node_modules",
    "build",
    "dist",
    "__pycache__",
    ".mypy_cache",
    ".pytest_cache",
    ".ruff_cache",
    "alembic",
    "migrations",
]

[tool.ruff.lint]
select = [
    "E", "F", "W",  # Pyflakes, pycodestyle
    "I",  # isort
    "N",  # pep8-naming
    "D",  # pydocstyle
    "UP",  # pyupgrade
    "B",  # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM",  # flake8-simplify
    "TCH",  # flake8-type-checking
    "PTH",  # flake8-use-pathlib
    "RUF",  # Ruff-specific
    "S",  # flake8-bandit
    "A",  # flake8-builtins
    "ARG",  # flake8-unused-arguments
    "Q",  # flake8-quotes
    "RET",  # flake8-return
    "TID",  # flake8-tidy-imports
]
ignore = [
    "D100",  # Missing docstring in public module
    "D104",  # Missing docstring in public package
    "D203",  # 1 blank line required before class docstring
    "D213",  # Multi-line docstring summary should start at the second line
    "D212",  # Multi-line docstring summary should start at the first line
    "S101",  # Use of assert
    "S301",  # Use of pickle
    "S303",  # Use of md5
    "S311",  # Use of random
    "S324",  # Use of hashlib
    "S404",  # Use of subprocess
    "S602",  # Use of exec
    "S607",  # Use of startswith with path
    "S701",  # Use of jinja2 with autoescape
    "S702",  # Use of mako
    "B008",  # Do not perform function calls in argument defaults
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*" = [
    "D",
    "S",
    "B",
    "ARG",
]
"backend/database/migrations/**/*" = [
    "D",
    "E",
    "F",
    "I",
    "N",
    "UP",
    "B",
    "S",
]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_any_unimported = true
ignore_missing_imports = true
exclude = [
    "alembic",
    "migrations",
    "tests",
    "venv",
    "env",
    "node_modules",
    "build",
    "dist",
]
follow_imports = "silent"
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_optional = true

[tool.pytest.ini_options]
minversion = "7.0"
addopts = "-ra -q --strict-markers -p no:cacheprovider --tb=short"
testpaths = [
    "tests",
    "backend/tests",
    "ai/tests",
    "trading/tests",
]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
markers = [
    "unit: Unit tests",
    "integration: Integration tests",
    "e2e: End-to-end tests",
    "performance: Performance tests",
    "slow: Slow tests",
    "fast: Fast tests",
    "smoke: Smoke tests",
    "regression: Regression tests",
    "security: Security tests",
]
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::UserWarning",
]
timeout = 300

[tool.coverage.run]
source = ["backend", "ai", "trading", "shared"]
omit = [
    "*/tests/*",
    "*/alembic/*",
    "*/migrations/*",
    "*/__pycache__/*",
    "*/venv/*",
    "*/env/*",
    "*/node_modules/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if self.debug:",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
]
show_missing = true
fail_under = 80

[tool.alembic]
script_location = "backend/database/migrations"
prepend_sys_path = "."
version_path_separator = "os"
sqlalchemy.url = "postgresql://nexus:nexus123@localhost:5432/nexus_ai"

[tool.commitizen]
name = "cz_conventional_commits"
version = "1.0.0"
tag_format = "v$version"
bump_message = "chore(release): bump version to $current_version -> $new_version"
version_files = [
    "pyproject.toml:version",
    "package.json:version",
]

[tool.semantic_release]
version_variable = "pyproject.toml:version"
commit_parser = "conventional"
changelog_merge_prerelease = true
branches = {
    "main": {"match": "main"},
    "develop": {"match": "develop"},
}

[tool.typos]
files = ["*.py", "*.md", "*.txt", "*.yaml", "*.yml", "*.json", "*.toml"]
exclude = [
    ".git",
    ".venv",
    "venv",
    "env",
    "node_modules",
    "build",
    "dist",
    "__pycache__",
    ".mypy_cache",
    ".pytest_cache",
    ".ruff_cache",
    "alembic",
    "migrations",
]

[tool.bandit]
exclude_dirs = ["tests", "alembic", "migrations", "venv", "env"]
skips = ["B101", "B311", "B303", "B324", "B404", "B602", "B607", "B701", "B702"]
severity = "medium"
confidence = "medium"

[tool.safety]
ignore = [
    "12345",  # Example ignore
]
security = true
full_report = true

[tool.isort]
profile = "black"
line_length = 88
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true

[tool.tbump]
current_version = "1.0.0"
files = [
    "pyproject.toml:version",
    "package.json:version",
]
