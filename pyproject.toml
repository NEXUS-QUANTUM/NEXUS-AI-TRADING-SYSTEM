[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

# ============================================
# PROJECT METADATA
# ============================================
[project]
name = "nexus-ai-trading-system"
version = "1.0.0"
description = "Plateforme IA de trading algorithmique universelle, autonome, modulaire et professionnelle"
readme = "README.md"
requires-python = ">=3.12"
license = {text = "Commercial"}
authors = [
    {name = "NEXUS QUANTUM LTD", email = "contact@nexusquantum.com"}
]
maintainers = [
    {name = "NEXUS QUANTUM LTD", email = "contact@nexusquantum.com"}
]
keywords = [
    "nexus",
    "ai",
    "trading",
    "algorithmic-trading",
    "machine-learning",
    "deep-learning",
    "cryptocurrency",
    "stocks",
    "forex",
    "quant",
    "finance",
    "fastapi",
    "trading-system"
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Financial and Insurance Industry",
    "Intended Audience :: Science/Research",
    "License :: Other/Proprietary License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Office/Business :: Financial :: Investment",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Scientific/Engineering :: Mathematics",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
urls = {
    "Homepage" = "https://nexustradingia.com",
    "Documentation" = "https://docs.nexustradingia.com",
    "Repository" = "https://github.com/NEXUS-QUANTUM/NEXUS-AI-TRADING-SYSTEM",
    "Issues" = "https://github.com/NEXUS-QUANTUM/NEXUS-AI-TRADING-SYSTEM/issues",
    "Changelog" = "https://github.com/NEXUS-QUANTUM/NEXUS-AI-TRADING-SYSTEM/blob/main/CHANGELOG.md",
}

